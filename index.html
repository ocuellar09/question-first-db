<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useMemo } = React;

    // ============================================================
    // CONSTANTES — config global del comportamiento de la app
    // ============================================================
    const REVEAL_TIMING_MS = {
      greens:  1400,  // delay para mostrar entidades VERDES tras seleccionar pregunta
      yellows: 2900,  // delay para sumar las AMARILLAS (decisión de diseño)
      all:     4200,  // delay final para sumar ROJAS + botones de acción
    };

    const CLAUDE_API = {
      url:     "https://api.anthropic.com/v1/messages",
      version: "2023-06-01",
      model:   "claude-sonnet-4-6",
    };

    // ============================================================
    // callClaudeJSON — única función fetch a Claude, reutilizada
    // por las 4 capas (analyze/architecture/visualization/schema)
    // ============================================================
    const callClaudeJSON = async ({ apiKey, system, userContent, maxTokens = 3000, useCache = false }) => {
      const systemField = useCache && typeof system === "string"
        ? [{ type: "text", text: system, cache_control: { type: "ephemeral" } }]
        : system;
      const response = await fetch(CLAUDE_API.url, {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": CLAUDE_API.version,
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: CLAUDE_API.model,
          max_tokens: maxTokens,
          system: systemField,
          messages: [{ role: "user", content: userContent }],
        }),
      });
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API ${response.status}: ${errText.slice(0, 300)}`);
      }
      const data = await response.json();
      const raw = (data.content?.[0]?.text || "").trim()
        .replace(/^```json\s*/i, "").replace(/^```\s*/, "").replace(/\s*```$/, "");
      try {
        return JSON.parse(raw);
      } catch {
        throw new Error(`No se pudo parsear el JSON de Claude. Texto crudo:\n${raw.slice(0, 500)}`);
      }
    };

    // ============================================================
    // DATA — Las preguntas pre-cargadas del taller
    // Cada pregunta describe: keywords, entities (con status), connections, SQL, traducción
    // ============================================================
    const QUESTIONS = [
      {
        id: "q1-ecommerce-top-customers",
        title: "Pregunta 1 — Top clientes (e-commerce)",
        text: "¿Quiénes son los 10 clientes que más han gastado este año?",
        keywords: ["clientes", "más", "gastado", "año"],
        entities: [
          { id: "customers",         label: "customers",        subtitle: "registro de clientes",      status: "existing", col: 1, row: 1, columns: ["id PK", "email UNIQUE", "full_name", "created_at"] },
          { id: "orders",            label: "orders",           subtitle: "cada pedido",               status: "existing", col: 2, row: 1, columns: ["id PK", "customer_id FK", "status", "total DECIMAL", "created_at"] },
          { id: "order_items",       label: "order_items",      subtitle: "detalle del pedido",        status: "existing", col: 3, row: 1, columns: ["order_id FK", "product_id FK", "quantity", "unit_price"] },
          { id: "customer_metrics",  label: "customer_metrics", subtitle: "LTV calculado runtime",     status: "design",   col: 2, row: 2, columns: ["total_spent (RUNTIME, no persistido)", "order_count (RUNTIME)", "last_order_at"] },
        ],
        connections: [
          { from: "customers", to: "orders" },
          { from: "orders",    to: "order_items" },
          { from: "customers", to: "customer_metrics" },
        ],
        sql:
`SELECT
  c.id, c.full_name, c.email,
  SUM(o.total)    AS total_gastado,
  COUNT(o.id)     AS num_pedidos
FROM customers c
JOIN orders o ON o.customer_id = c.id
WHERE o.status NOT IN ('cancelled', 'refunded')
  AND o.created_at >= DATE_TRUNC('year', CURRENT_DATE)
GROUP BY c.id
ORDER BY total_gastado DESC
LIMIT 10;`,
        translation: "El sistema PUEDE sumar todos los pedidos válidos de cada cliente y ordenar. Funciona. La parte amarilla: si quieres ver la evolución del LTV mes a mes, NO la tienes — solo el valor de hoy. Con 1M clientes el query se vuelve lento sin materializar.",
        designDecision: "Materializar customer_metrics (total_spent, order_count, last_order_at) + snapshot mensual para tendencia y modelos de churn.",
        plainSummary: "Para responder esto el sistema necesita: la lista de clientes, sus órdenes válidas, y la suma de cada orden. Las 3 cosas están. Lo amarillo: si tienes 1M clientes el reporte tarda porque suma desde cero cada vez.",
        concreteExample: "Resultado: 'María Gómez — $4,200 en 12 pedidos. Pedro Ramírez — $3,800 en 8 pedidos. Ana Torres — $3,100 en 15 pedidos.' Top 10 ordenado de mayor a menor del año en curso.",
        architectureAnalysis: {
          summary: "El cálculo runtime funciona con pocos clientes. Para escalar y habilitar tendencias + ML de churn, hay que materializar customer_metrics + snapshot mensual.",
          items: [
            {
              entityId: "customer_metrics",
              recommendation: "snapshot",
              reasoning: "total_spent calculado runtime no escala. Sin snapshots mensuales pierdes la curva del LTV — solo tienes el valor actual.",
              mlRelevance: "critical",
              mlContext: "Modelo de regresión de LTV predictivo a 90 días + modelo de churn binario que necesita serie temporal de gasto"
            }
          ]
        }
      },
      {
        id: "q2-saas-churn",
        title: "Pregunta 2 — Riesgo de cancelación (SaaS)",
        text: "¿Qué usuarios están en riesgo de cancelar en los próximos 30 días?",
        keywords: ["usuarios", "riesgo", "cancelar"],
        entities: [
          { id: "users",                label: "users",                subtitle: "usuarios registrados",            status: "existing", col: 1, row: 1, columns: ["id PK", "email", "plan", "signed_up_at", "last_active_at"] },
          { id: "subscriptions",        label: "subscriptions",        subtitle: "suscripciones",                   status: "existing", col: 2, row: 1, columns: ["user_id FK", "plan", "status", "started_at", "cancelled_at"] },
          { id: "usage_events",         label: "usage_events",         subtitle: "eventos como JSON sin schema",    status: "design",   col: 3, row: 1, columns: ["user_id FK", "event_type", "occurred_at", "payload JSONB (sin schema)"] },
          { id: "churn_risk_score",     label: "churn_risk_score",     subtitle: "FALTA — scoring estructurado",    status: "missing",  col: 1, row: 2, columns: ["user_id FK", "score (0-100)", "computed_at", "factors JSONB", "model_version"] },
          { id: "cancellation_signals", label: "cancellation_signals", subtitle: "FALTA — señales tempranas",        status: "missing",  col: 3, row: 2, columns: ["user_id FK", "signal_type ENUM", "occurred_at", "severity"] },
        ],
        connections: [
          { from: "users",        to: "subscriptions" },
          { from: "users",        to: "usage_events" },
          { from: "users",        to: "churn_risk_score" },
          { from: "users",        to: "cancellation_signals" },
        ],
        sql:
`-- Hoy: solo proxy débil (usuarios "inactivos")
SELECT u.id, u.email, u.plan, u.last_active_at,
       AGE(NOW(), u.last_active_at) AS inactivity
FROM users u
JOIN subscriptions s ON s.user_id = u.id
WHERE s.status = 'active'
  AND u.last_active_at < NOW() - INTERVAL '14 days'
ORDER BY u.last_active_at ASC;

-- IDEAL: score + signals + features  (HOY NO SE PUEDE)
SELECT u.id, u.email, crs.score, crs.factors,
       COUNT(cs.id) AS signal_count
FROM users u
LEFT JOIN churn_risk_score crs
       ON crs.user_id = u.id
      AND crs.computed_at::date = CURRENT_DATE
LEFT JOIN cancellation_signals cs
       ON cs.user_id = u.id
      AND cs.occurred_at > NOW() - INTERVAL '30 days'
WHERE crs.score >= 70
GROUP BY u.id, crs.score, crs.factors
ORDER BY crs.score DESC;`,
        translation: "Hoy solo puedes responder esto mirando usuarios INACTIVOS — un proxy débil. Predicción real requiere score + señales (downgrades, quejas, drops de uso) + modelo entrenado. Sin eventos estructurados ni snapshots, no entrenas nada.",
        designDecision: "1) Estructurar usage_events con event_type ENUM + payload por type. 2) Crear churn_risk_score como snapshot diario. 3) cancellation_signals como log append-only.",
        plainSummary: "Para anticipar quién va a cancelar el sistema necesita 3 cosas: medir uso REAL (no solo último login), capturar SEÑALES de descontento, y tener un MODELO entrenado con datos históricos. Hoy solo se mira el último login — predice mal y tarde.",
        concreteExample: "Resultado ideal: 'Acme Corp (plan Pro) — score 87/100. Razones: dejó de usar feature X hace 12 días, 3 tickets de queja, downgrade attempt detectado.' Listado priorizado para customer success.",
        architectureAnalysis: {
          summary: "Para construir un modelo de churn predictivo, los 3 elementos faltantes son críticos: eventos estructurados (training data), score histórico (target + features), y señales atómicas (features tempranas).",
          items: [
            {
              entityId: "usage_events",
              recommendation: "materialize",
              reasoning: "Hoy el payload es JSONB sin schema — imposible de usar como feature de ML. Hay que estructurar event_type como ENUM y schema por tipo de evento.",
              mlRelevance: "critical",
              mlContext: "Features primarias de cualquier modelo de churn — engagement por feature, frecuencia, recencia"
            },
            {
              entityId: "churn_risk_score",
              recommendation: "snapshot",
              reasoning: "Append-only diario con score + features + versión del modelo. Sin esto no hay backtesting ni auditoría de predicciones.",
              mlRelevance: "critical",
              mlContext: "Output del modelo de clasificación binaria + tracking de drift del modelo"
            },
            {
              entityId: "cancellation_signals",
              recommendation: "materialize",
              reasoning: "Log atómico de eventos críticos (downgrade, queja, drop de uso). Triggers para alertas en tiempo real.",
              mlRelevance: "useful",
              mlContext: "Features secundarias del modelo — eventos cualitativos vs solo cuantitativos"
            }
          ]
        }
      },
      {
        id: "q3-edtech-stuck-module",
        title: "Pregunta 3 — Módulo de abandono (edtech)",
        text: "¿En qué módulo del curso se atascan más los estudiantes?",
        keywords: ["módulo", "atascan", "estudiantes"],
        entities: [
          { id: "courses",         label: "courses",         subtitle: "catálogo de cursos",       status: "existing", col: 1, row: 1, columns: ["id PK", "title", "duration_weeks", "is_active"] },
          { id: "modules",         label: "modules",         subtitle: "módulos del curso",        status: "existing", col: 2, row: 1, columns: ["id PK", "course_id FK", "title", "\"order\""] },
          { id: "enrollments",     label: "enrollments",     subtitle: "estudiantes inscritos",     status: "existing", col: 3, row: 1, columns: ["id PK", "user_id FK", "course_id FK", "started_at"] },
          { id: "module_progress", label: "module_progress", subtitle: "avance por módulo",         status: "existing", col: 2, row: 2, columns: ["enrollment_id FK", "module_id FK", "status", "started_at", "completed_at"] },
        ],
        connections: [
          { from: "courses",     to: "modules" },
          { from: "courses",     to: "enrollments" },
          { from: "enrollments", to: "module_progress" },
          { from: "modules",     to: "module_progress" },
        ],
        sql:
`WITH last_attempted AS (
  SELECT DISTINCT ON (mp.enrollment_id)
    mp.enrollment_id, mp.module_id, mp.status
  FROM module_progress mp
  WHERE mp.status != 'completed'
  ORDER BY mp.enrollment_id, mp.started_at DESC
)
SELECT
  m.id AS modulo_id,
  m."order" AS modulo_n,
  m.title AS modulo_titulo,
  COUNT(la.enrollment_id) AS estudiantes_atascados
FROM last_attempted la
JOIN modules m ON m.id = la.module_id
GROUP BY m.id, m."order", m.title
ORDER BY estudiantes_atascados DESC;`,
        translation: "Esta pregunta se responde PERFECTO con las tablas que tienes. El sistema mira el último módulo donde cada estudiante quedó atascado, agrupa por módulo, cuenta. Módulo con más alumnos parados = módulo que hay que revisar urgente.",
        designDecision: "Cero cambios necesarios. El next-step natural sería materializar stuck_risk_score por enrollment (cron diario) para INTERVENIR antes de que abandonen.",
        plainSummary: "Para responder esto el sistema mira el último módulo que cada estudiante tocó sin completar, agrupa por módulo, y cuenta. Cero gaps. El módulo con más estudiantes parados es el problemático.",
        concreteExample: "Resultado: 'Módulo 4 — Análisis estadístico: 23 estudiantes atascados. Módulo 7: 11. Módulo 2: 3. Módulo 1: 0.' Conclusión obvia: el módulo 4 necesita revisión de contenido.",
        architectureAnalysis: {
          summary: "Todo verde. La pregunta se responde con queries simples. El next-step natural: materializar stuck_risk_score para intervenir ANTES del abandono — convierte reporting reactivo en producto con ML.",
          items: [
            {
              entityId: "module_progress",
              recommendation: "snapshot",
              reasoning: "Ya está materializado. Agregar snapshot semanal del avance permite analizar tendencias de abandono por cohorte.",
              mlRelevance: "useful",
              mlContext: "Modelo de predicción de abandono en próximo módulo — features: tiempo en módulo actual, módulos completados previos, ritmo histórico"
            }
          ]
        }
      },
      {
        id: "q4-healthtech-no-shows",
        title: "Pregunta 4 — No-shows por doctor (healthtech)",
        text: "¿Cuál es la tasa de no-shows por doctor y por horario del día?",
        keywords: ["no-shows", "doctor", "horario", "tasa"],
        entities: [
          { id: "doctors",            label: "doctors",            subtitle: "doctores con especialidad",   status: "existing", col: 1, row: 1, columns: ["id PK", "name", "specialty", "license"] },
          { id: "appointments",       label: "appointments",       subtitle: "citas con status libre",      status: "design",   col: 2, row: 1, columns: ["id PK", "doctor_id FK", "patient_id FK", "scheduled_at", "status VARCHAR (debería ENUM)"] },
          { id: "patients",           label: "patients",           subtitle: "pacientes",                    status: "existing", col: 3, row: 1, columns: ["id PK", "name", "phone"] },
          { id: "no_show_risk_score", label: "no_show_risk_score", subtitle: "FALTA — score por cita",       status: "missing",  col: 1, row: 2, columns: ["appointment_id FK", "risk_score", "factors JSONB", "computed_at"] },
          { id: "reminders_log",      label: "reminders_log",      subtitle: "FALTA — recordatorios",        status: "missing",  col: 3, row: 2, columns: ["appointment_id FK", "channel ENUM", "sent_at", "response", "minutes_before"] },
        ],
        connections: [
          { from: "doctors",      to: "appointments" },
          { from: "patients",     to: "appointments" },
          { from: "appointments", to: "no_show_risk_score" },
          { from: "appointments", to: "reminders_log" },
        ],
        sql:
`SELECT
  d.name      AS doctor,
  d.specialty,
  EXTRACT(HOUR FROM a.scheduled_at) AS hora,
  COUNT(*)    AS total_citas,
  COUNT(*) FILTER (WHERE a.status = 'no_show') AS no_shows,
  ROUND(100.0 * COUNT(*) FILTER (WHERE a.status = 'no_show') / COUNT(*), 1) AS pct_no_show
FROM appointments a
JOIN doctors d ON d.id = a.doctor_id
WHERE a.scheduled_at >= NOW() - INTERVAL '90 days'
GROUP BY d.id, d.name, d.specialty, EXTRACT(HOUR FROM a.scheduled_at)
HAVING COUNT(*) >= 10
ORDER BY pct_no_show DESC, total_citas DESC;`,
        translation: "Puedes calcular la TASA de no-show por doctor y por hora. PROBLEMA: si appointments.status es texto libre, puede tener typos ('NoShow', 'no-show', 'NO_SHOW') que rompen el conteo. Y sin reminders ni risk_score solo MIDES — no PREVIENES.",

# DECISIONES DE DISEÑO TÍPICAS (status: "design" — AMARILLO)
Patrones que aparecen en BDs reales y limitan analítica:
- Campos status/category/tier como VARCHAR libre (debería ser ENUM o FK a catálogo)
- Columnas JSONB sin schema explícito (metadata, options, settings)

    // ============================================================
    // imageToBase64 — File → base64 sin prefijo data:
    // ============================================================
    const imageToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        const base64 = String(result).split(",")[1];
        resolve({ data: base64, mediaType: file.type });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // ============================================================
    // processSchema — convierte DDL/texto/imagen en knowledge base
    // ============================================================
    const processSchema = async ({ type, text, image }, apiKey) => {
      const userContent = type === "image" && image
        ? [
            { type: "image", source: { type: "base64", media_type: image.mediaType, data: image.data } },
            { type: "text", text: "Esta imagen es el diagrama/ERD de una base de datos. Analízalo y devuelve el JSON con name, summary, tablesCount y knowledgePrompt según el schema indicado en system." }
          ]
        : `Esquema recibido (${type === "ddl" ? "DDL/SQL" : "descripción libre"}):\n\n\`\`\`\n${text}\n\`\`\`\n\nDevuelve el JSON ahora.`;

      const parsed = await callClaudeJSON({
        apiKey,
        system: SCHEMA_PROCESSING_PROMPT,
        userContent,
        maxTokens: 4000,
      });

      if (parsed.error) throw new Error(parsed.error);
      if (!parsed.knowledgePrompt) throw new Error("Respuesta sin knowledgePrompt válido.");

      parsed.processedAt = new Date().toISOString();
      parsed.sourceType = type;
      return parsed;
    };

    const ARCHITECTURE_PROMPT = `Eres un arquitecto de datos senior con experiencia en plataformas de ML. Recibirás una pregunta de negocio que YA fue descompuesta en entidades (verdes=existen, amarillas=decisión de diseño, rojas=faltan). Tu trabajo: para cada entidad AMARILLA o ROJA, decidir CÓMO debería existir el dato — y advertir si es crítico para ML futuro.

Devuelve ÚNICAMENTE JSON válido (sin markdown, sin texto fuera):
{
  "summary": "<1-2 frases tipo gerente: cuál es la decisión arquitectónica más importante de esta pregunta>",
  "items": [
    {
      "entityId": "<id de la entidad amarilla o roja>",
      "recommendation": "runtime" | "materialize" | "snapshot" | "new_rule",
      "reasoning": "<1-2 frases: POR QUÉ esa recomendación>",
      "mlRelevance": "critical" | "useful" | "low",
      "mlContext": "<qué modelo concreto se beneficia: predicción de churn, recomendación de X, clustering de Y, etc. Vacío si mlRelevance=low>"
    }
  ]
}

CRITERIOS DE 'recommendation':
- "runtime": calcular al vuelo en backend, no persistir. Bueno cuando: la fórmula cambia, no hay history, el dato siempre es derivable barato
- "materialize": columna o tabla con valor actual persistido (puede tener trigger). Bueno cuando: dispara eventos de negocio, se lee muchísimo, es un EVENTO con momento de transición
- "snapshot": tabla append-only con timestamps periódicos. Bueno cuando: necesitas historia, tendencias, training data para ML, audit trail, time-travel
- "new_rule": no es tabla — es lógica de negocio (trigger postgres, cron, background job). Bueno cuando: es automatización detrás de un materialize

CRITERIOS DE 'mlRelevance':
- "critical": sin este dato persistido NO se puede entrenar el modelo más valioso del dominio
- "useful": útil como feature secundario o validador, pero no es el target ni feature primario
- "low": probablemente no se use para ML (datos de configuración, lookup tables, etc.)

REGLAS:
1. Solo analiza entidades con status="design" o status="missing". Ignora las verdes.
2. Si todas las entidades son verdes, items=[] y summary explica qué ML next-step sería el natural a partir de esta data ya disponible.
3. Sé directo. Sin hedging.
4. mlContext debe nombrar un MODELO CONCRETO con su tipo (clasificación, regresión, clustering, recomendación, NLP), no genéricos.`;

- bar / horizontal_bar: [{ "label": "string", "value": number }] (3-8 items)
- funnel: [{ "stage": "string", "value": number }] (3-6 stages, valores DECRECIENTES)
- kpi_card: { "value": "string formateado (ej '37%', '142', '$3.4k', '4.2/5')", "label": "string corto", "trend": "string opcional (ej '+5pp', '-12')", "trendDirection": "up"|"down"|"flat", "sparkline": [number,number,...] (7-12 puntos opcionales) }
- heatmap: { "rows": [string], "cols": [string], "values": [[number,...],...] } (3-5 rows, 3-7 cols, valores 0-100 representando intensidad)

CRITERIOS PARA ELEGIR chartType:
- Conteo o porcentaje único actual → kpi_card
- Evolución temporal → line
- Comparación entre categorías discretas → bar / horizontal_bar
- Conversión/abandono por etapas secuenciales → funnel
- Cruce 2D (perfil × módulo, por ejemplo) → heatmap

REGLAS:
1. Mínimo 1 chart, máximo 2 por pregunta (si la pregunta justifica 2 vistas complementarias)
2. mockData REALISTA al dominio detectado: si es coaching, nombres como María, Pedro, módulos plausibles. Si es e-commerce, montos en moneda creíble.
3. Si la pregunta es sobre un solo KPI claro, el primer chart DEBE ser kpi_card. El segundo puede ser line para mostrar evolución.
4. insight = acción concreta, no descripción genérica
5. NO inventes chart types fuera del enum`;

    // ============================================================

    // ============================================================
    const analyzeVisualization = async (question, apiKey, customKnowledge = null) => {
      const userPayload = {
        question: question.text,
        entities: question.entities.map(e => ({ id: e.id, status: e.status, subtitle: e.subtitle })),
      };
      const parsed = await callClaudeJSON({
        apiKey,
        system: VISUALIZATION_PROMPT + (customKnowledge ? "\n\n# CONTEXTO DE DOMINIO:\n" + customKnowledge.slice(0, 2000) : ""),
        userContent: `Dashboard imaginado para:\n\n${JSON.stringify(userPayload, null, 2)}\n\nDevuelve el JSON ahora.`,
        maxTokens: 2500,
      });
      if (!parsed.charts || !Array.isArray(parsed.charts)) parsed.charts = [];
      return parsed;
    };

    // ============================================================
    // analyzeWithClaude — llama a Claude API desde el browser
    // ============================================================
    const analyzeWithClaude = async (questionText, apiKey, customKnowledge = null) => {

        apiKey,
        system: customKnowledge || SCHEMA_KNOWLEDGE,
        userContent: `Pregunta del cliente: "${questionText}"\n\nDevuelve el JSON ahora, sin nada más.`,
        maxTokens: 3000,
        useCache: true,
      });

      if (!parsed.entities || !Array.isArray(parsed.entities) || parsed.entities.length === 0) {
        throw new Error("Claude devolvió una respuesta sin entidades válidas.");

      parsed.id = `live-${Date.now()}`;
      parsed.title = parsed.title || "Pregunta del cliente";
      return parsed;

    // ============================================================

    const useSequenced = (items, intervalMs, enabled) => {
      const [visibleCount, setVisibleCount] = useState(0);
      useEffect(() => {
        if (!enabled) { setVisibleCount(0); return; }
        setVisibleCount(0);
        const timers = items.map((_, i) =>
          setTimeout(() => setVisibleCount((c) => Math.max(c, i + 1)), i * intervalMs)
        );
        return () => timers.forEach(clearTimeout);
      }, [enabled, items.length, intervalMs]);
      return visibleCount;
    };

    // ============================================================

    const StatusBadge = ({ status }) => {

          {s.icon === "x" &&     <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>}

    const EntityCard = ({ entity, index, total }) => {

    const PlainSummary = ({ summary }) => (

    const ConnectionsSVG = ({ entities, connections, visibleEntityIds }) => {
      const containerRef = useRef(null);
      const [paths, setPaths] = useState([]);

      useEffect(() => {
        const calc = () => {
          if (!containerRef.current) return;
          const container = containerRef.current.parentElement;
          if (!container) return;
          const containerRect = container.getBoundingClientRect();
          const newPaths = connections
            .filter(c => visibleEntityIds.has(c.from) && visibleEntityIds.has(c.to))
            .map((c, i) => {
              const fromEl = container.querySelector(`[data-entity-id="${c.from}"]`);
              const toEl   = container.querySelector(`[data-entity-id="${c.to}"]`);
              if (!fromEl || !toEl) return null;
              const fr = fromEl.getBoundingClientRect();
              const tr = toEl.getBoundingClientRect();
              const fromX = fr.left + fr.width / 2 - containerRect.left;
              const fromY = fr.top  + fr.height / 2 - containerRect.top;
              const toX   = tr.left + tr.width / 2 - containerRect.left;
              const toY   = tr.top  + tr.height / 2 - containerRect.top;
              const toEntity = entities.find(e => e.id === c.to);
              const fromEntity = entities.find(e => e.id === c.from);
              const isMissing = toEntity?.status === "missing" || fromEntity?.status === "missing";
              const isDesign  = !isMissing && (toEntity?.status === "design" || fromEntity?.status === "design");
              const stroke = isMissing ? "#ef4444" : isDesign ? "#f59e0b" : "#52525b";
              const midY = (fromY + toY) / 2;
              const d = `M ${fromX} ${fromY} C ${fromX} ${midY}, ${toX} ${midY}, ${toX} ${toY}`;
              return { d, stroke, key: `${c.from}-${c.to}-${i}`, dashed: isMissing };
            })
            .filter(Boolean);
          setPaths(newPaths);
        };
        const id = setTimeout(calc, 50);
        window.addEventListener("resize", calc);
        return () => { clearTimeout(id); window.removeEventListener("resize", calc); };
      }, [connections, visibleEntityIds, entities]);

      return (
        <svg ref={containerRef} className="absolute inset-0 pointer-events-none" style={{ width: "100%", height: "100%" }}>
          {paths.map(p => (
            <path
              key={p.key}
              d={p.d}
              stroke={p.stroke}
              strokeWidth="2.5"
              fill="none"
              strokeDasharray={p.dashed ? "8 6" : "1000"}
              className={p.dashed ? "" : "draw-line"}
              opacity="0.7"
            />
          ))}
        </svg>
      );
    };

    const useViewport = () => {
      const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1280);
      useEffect(() => {
        const onR = () => setW(window.innerWidth);
        window.addEventListener("resize", onR);
        return () => window.removeEventListener("resize", onR);
      }, []);
      return { width: w, isMobile: w < 640, isTablet: w >= 640 && w < 1024, isDesktop: w >= 1024 };
    };

    const Canvas = ({ question, stage }) => {
      const { isMobile, isTablet, isDesktop } = useViewport();
      const visibleEntities = useMemo(() => {
        if (stage < 2) return [];
        const greens  = question.entities.filter(e => e.status === "existing");
        const yellows = question.entities.filter(e => e.status === "design");
        const reds    = question.entities.filter(e => e.status === "missing");
        if (stage === 2) return greens;
        if (stage === 3) return [...greens, ...yellows];
        return [...greens, ...yellows, ...reds];
      }, [question, stage]);

      const visibleIds = useMemo(() => new Set(visibleEntities.map(e => e.id)), [visibleEntities]);

      const cols = Math.max(...question.entities.map(e => e.col));
      const rows = Math.max(...question.entities.map(e => e.row));

      // Responsive: mobile = 1 col apilada, tablet = max 2 cols auto-fit, desktop = layout posicional
      const gridStyle = isMobile
        ? { gridTemplateColumns: "1fr", gridAutoRows: "minmax(180px, auto)" }
        : isTablet
        ? { gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gridAutoRows: "minmax(180px, auto)" }
        : { gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${rows}, minmax(190px, auto))` };

      return (
        <div className="relative bg-grid rounded-2xl p-4 sm:p-6 md:p-8 border border-zinc-800" style={{ minHeight: isMobile ? "auto" : "520px" }}>
          <div className="relative grid gap-4 sm:gap-6" style={gridStyle}>
            {visibleEntities.map((e, i) => (
              <div
                key={e.id}
                data-entity-id={e.id}
                style={isDesktop ? { gridColumn: e.col, gridRow: e.row } : undefined}
              >
                <EntityCard entity={e} index={i} total={visibleEntities.length} />
              </div>
            ))}
            {isDesktop && (
              <ConnectionsSVG entities={question.entities} connections={question.connections} visibleEntityIds={visibleIds} />
            )}
          </div>
          {!isDesktop && visibleEntities.length > 1 && (
            <div className="mt-4 text-xs text-zinc-600 text-center italic">Conexiones visibles en pantalla amplia</div>
          )}
        </div>
      );
    };

    const HighlightedQuestion = ({ text, keywords }) => {
      const pattern = new RegExp(`(${keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join("|")})`, "gi");
      const parts = text.split(pattern);
      return (
        <p className="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold leading-snug sm:leading-tight text-white">
          {parts.map((part, i) => {
            const isKeyword = keywords.some(k => k.toLowerCase() === part.toLowerCase());
            return isKeyword
              ? <span key={i} className="keyword-highlight text-amber-200">{part}</span>
              : <span key={i}>{part}</span>;
          })}
        </p>
      );
    };

    const PANEL_COLORS = {
      emerald: { border: "border-emerald-500/40", bg: "bg-emerald-500/5",  icon: "bg-emerald-500/20 text-emerald-400" },
      amber:   { border: "border-amber-500/40",   bg: "bg-amber-500/5",    icon: "bg-amber-500/20 text-amber-400"     },
      red:     { border: "border-red-500/40",     bg: "bg-red-500/5",      icon: "bg-red-500/20 text-red-400"         },
    };

    const Panel = ({ icon, title, color, children, onClose }) => {

      return (

          <div className={`bg-zinc-950 border-2 ${c.border} rounded-3xl w-full max-w-4xl max-h-[85vh] overflow-hidden flex flex-col`} onClick={e => e.stopPropagation()}>
            <div className={`px-6 py-4 border-b border-zinc-800 flex items-center justify-between ${c.bg}`}>

        </div>
      );
    };

    // ============================================================
    // MiniChart — SVG hand-coded para 6 tipos de visualización
    // ============================================================
    const LineSvg = ({ data }) => {
      const W = 600, H = 240, P = 36;
      const xs = data.map((_, i) => P + (i * (W - 2 * P) / Math.max(data.length - 1, 1)));
      const ys_raw = data.map(d => d.y);
      const maxY = Math.max(...ys_raw, 1);
      const minY = Math.min(...ys_raw, 0);
      const range = maxY - minY || 1;
      const ys = ys_raw.map(y => H - P - ((y - minY) / range) * (H - 2 * P));
      const pathD = xs.map((x, i) => `${i === 0 ? "M" : "L"} ${x} ${ys[i]}`).join(" ");
      const areaD = `${pathD} L ${xs[xs.length-1]} ${H-P} L ${xs[0]} ${H-P} Z`;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
          <defs>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#22d3ee" stopOpacity="0.4"/>
              <stop offset="100%" stopColor="#22d3ee" stopOpacity="0"/>
            </linearGradient>
          </defs>
          {[0, 0.25, 0.5, 0.75, 1].map((t, i) => (
            <line key={i} x1={P} x2={W-P} y1={P + t*(H-2*P)} y2={P + t*(H-2*P)} stroke="#27272a" strokeWidth="1"/>
          ))}
          <path d={areaD} fill="url(#lineGrad)"/>
          <path d={pathD} stroke="#22d3ee" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          {xs.map((x, i) => (
            <g key={i}>
              <circle cx={x} cy={ys[i]} r="5" fill="#22d3ee" stroke="#0a0a0a" strokeWidth="2"/>
              <text x={x} y={H-12} fill="#71717a" fontSize="11" textAnchor="middle">{data[i].x}</text>
            </g>
          ))}
          <text x={P-8} y={P+4} fill="#71717a" fontSize="10" textAnchor="end">{maxY.toFixed(0)}</text>
          <text x={P-8} y={H-P+4} fill="#71717a" fontSize="10" textAnchor="end">{minY.toFixed(0)}</text>
        </svg>
      );
    };

    const BarSvg = ({ data, horizontal = false }) => {
      const W = 600, H = 280, P = 40;
      const maxV = Math.max(...data.map(d => d.value), 1);
      if (horizontal) {
        const rowH = (H - 2 * P) / data.length;
        const barH = Math.min(rowH * 0.7, 36);
        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
            {data.map((d, i) => {
              const w = ((W - 2 * P - 120) * d.value / maxV);
              const y = P + i * rowH + (rowH - barH) / 2;
              return (
                <g key={i}>
                  <text x={P} y={y + barH/2 + 4} fill="#e4e4e7" fontSize="12" textAnchor="start">{d.label}</text>
                  <rect x={P + 120} y={y} width={w} height={barH} rx="4" fill="#22d3ee" opacity="0.85"/>
                  <text x={P + 124 + w} y={y + barH/2 + 4} fill="#22d3ee" fontSize="12" fontWeight="bold" textAnchor="start">{d.value}</text>
                </g>
              );
            })}
          </svg>
        );
      }
      const barW = Math.min((W - 2 * P) / data.length * 0.65, 80);
      const gap = (W - 2 * P - barW * data.length) / Math.max(data.length - 1, 1);
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
          {data.map((d, i) => {
            const x = P + i * (barW + gap);
            const h = ((H - 2 * P - 30) * d.value / maxV);
            const y = H - P - h;
            return (
              <g key={i}>
                <rect x={x} y={y} width={barW} height={h} rx="4" fill="#22d3ee" opacity="0.85"/>
                <text x={x + barW/2} y={y - 6} fill="#22d3ee" fontSize="12" fontWeight="bold" textAnchor="middle">{d.value}</text>
                <text x={x + barW/2} y={H - P + 18} fill="#a1a1aa" fontSize="11" textAnchor="middle">{d.label}</text>
              </g>
            );
          })}
        </svg>
      );
    };

    const FunnelSvg = ({ data }) => {
      const W = 600, H = 280, P = 30;
      const maxV = data[0]?.value || 1;
      const rowH = (H - 2 * P) / data.length;
      const barH = rowH * 0.78;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
          {data.map((d, i) => {
            const w = ((W - 2 * P - 160) * d.value / maxV);
            const x = (W - w) / 2;
            const y = P + i * rowH + (rowH - barH) / 2;
            const prev = i > 0 ? data[i-1].value : null;
            const pctOfPrev = prev ? Math.round((d.value / prev) * 100) : 100;
            const colors = ["#22d3ee", "#06b6d4", "#0891b2", "#0e7490", "#155e75", "#164e63"];
            return (
              <g key={i}>
                <rect x={x} y={y} width={w} height={barH} rx="6" fill={colors[i] || "#164e63"}/>
                <text x={x + w/2} y={y + barH/2 + 5} fill="#fafafa" fontSize="14" fontWeight="bold" textAnchor="middle">{d.stage}</text>
                <text x={W - P} y={y + barH/2 + 5} fill="#71717a" fontSize="13" fontWeight="bold" textAnchor="end">{d.value}</text>
                {i > 0 && <text x={W - P} y={y + barH/2 + 22} fill="#52525b" fontSize="10" textAnchor="end">{pctOfPrev}% del anterior</text>}
              </g>
            );
          })}
        </svg>
      );
    };

    const KpiCard = ({ data }) => {
      const trendColor = data.trendDirection === "up" ? "#10b981" : data.trendDirection === "down" ? "#ef4444" : "#a1a1aa";
      const arrow = data.trendDirection === "up" ? "↑" : data.trendDirection === "down" ? "↓" : "→";
      const spark = data.sparkline || [];
      return (
        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-6 sm:gap-8 py-4">
          <div className="flex-shrink-0">
            <div className="text-6xl sm:text-7xl font-black text-white leading-none tracking-tight">{data.value}</div>
            <div className="text-sm text-zinc-400 mt-2 uppercase tracking-wider font-semibold">{data.label}</div>
            {data.trend && (
              <div className="mt-3 flex items-center gap-2">
                <span className="text-2xl font-bold" style={{color: trendColor}}>{arrow}</span>
                <span className="text-lg font-bold" style={{color: trendColor}}>{data.trend}</span>
              </div>
            )}
          </div>
          {spark.length > 1 && (
            <div className="flex-1 w-full sm:w-auto">
              <svg viewBox="0 0 300 80" className="w-full h-auto" preserveAspectRatio="none">
                {(() => {
                  const W = 300, H = 80, P = 4;
                  const maxV = Math.max(...spark, 1);
                  const minV = Math.min(...spark, 0);
                  const range = maxV - minV || 1;
                  const xs = spark.map((_, i) => P + (i * (W - 2*P) / Math.max(spark.length - 1, 1)));
                  const ys = spark.map(v => H - P - ((v - minV) / range) * (H - 2*P));
                  const d = xs.map((x, i) => `${i === 0 ? "M" : "L"} ${x} ${ys[i]}`).join(" ");
                  return (
                    <>
                      <defs>
                        <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor={trendColor} stopOpacity="0.3"/>
                          <stop offset="100%" stopColor={trendColor} stopOpacity="0"/>
                        </linearGradient>
                      </defs>
                      <path d={`${d} L ${xs[xs.length-1]} ${H} L ${xs[0]} ${H} Z`} fill="url(#sparkGrad)"/>
                      <path d={d} stroke={trendColor} strokeWidth="2.5" fill="none" strokeLinecap="round"/>
                    </>
                  );
                })()}
              </svg>
              <div className="text-[10px] text-zinc-500 mt-1 uppercase tracking-wider">Últimos {spark.length} períodos</div>
            </div>
          )}
        </div>
      );
    };

    const HeatmapSvg = ({ data }) => {
      const { rows = [], cols = [], values = [] } = data;
      const cellW = 60, cellH = 40, rowLabelW = 110, colLabelH = 30;
      const W = rowLabelW + cellW * cols.length + 16;
      const H = colLabelH + cellH * rows.length + 16;
      const colorFor = (v) => {
        const t = Math.min(Math.max(v / 100, 0), 1);
        const r = Math.round(15 + (34 - 15) * t);
        const g = Math.round(118 + (211 - 118) * t);
        const b = Math.round(110 + (238 - 110) * t);
        return `rgb(${r},${g},${b})`;
      };
      return (

              <div className="space-y-5">
                <div className="p-5 bg-gradient-to-br from-violet-500/15 to-violet-500/5 border-2 border-violet-500/40 rounded-2xl">
                  <div className="text-xs font-bold text-violet-300 tracking-widest mb-3">DECISIÓN ARQUITECTÓNICA CLAVE</div>
                  <p className="text-lg text-white leading-relaxed font-medium">{currentArchitecture.summary}</p>
                </div>
                {currentArchitecture.items && currentArchitecture.items.length > 0 ? (
                  <div className="space-y-4">
                    {currentArchitecture.items.map((item, i) => {
                      const rec = ARCH_REC_MAP[item.recommendation] || ARCH_REC_MAP.materialize;
                      const mlBadge = ARCH_ML_MAP[item.mlRelevance] || ARCH_ML_MAP.low;
                      return (
                        <div key={i} className={`p-5 ${rec.bg} border ${rec.border} rounded-2xl`}>
                          <div className="flex items-center gap-3 mb-3 flex-wrap">
                            <code className={`${rec.text} font-bold text-base`}>{item.entityId}</code>
                            <div className={`px-3 py-1 rounded-full text-xs font-bold tracking-widest ${rec.text} ${rec.bg} border ${rec.border}`}>
                              → {rec.label}
                            </div>
                            <div className={`px-2.5 py-1 rounded-full text-[10px] font-bold tracking-widest border ${mlBadge.color}`}>
                              {mlBadge.label}
                            </div>
                          </div>
                          <div className={`text-xs ${rec.text} opacity-70 mb-2 italic`}>{rec.subtitle}</div>
                          <p className="text-white leading-relaxed mb-3">{item.reasoning}</p>
                          {item.mlContext && item.mlRelevance !== "low" && (
                            <div className="mt-3 p-3 bg-zinc-950/40 border border-zinc-800 rounded-xl">
                              <div className="text-[10px] font-bold text-zinc-500 tracking-widest mb-1">QUÉ MODELO SE BENEFICIA</div>
                              <p className="text-sm text-zinc-200 leading-relaxed">{item.mlContext}</p>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="p-5 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl">
                    <div className="text-xs font-bold text-emerald-400 tracking-widest mb-2">SIN DECISIONES PENDIENTES</div>
                    <p className="text-white leading-relaxed">Esta pregunta no tiene gaps arquitectónicos. Las tablas involucradas ya están materializadas correctamente. El próximo paso natural está en el resumen de arriba.</p>
                  </div>
                )}
              </div>
            )}
          </Panel>
        );
      }

      if (openPanel === "gaps") {
        return (
          <Panel icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>} title="¿Qué falta? — Roadmap" color="red" onClose={onClose}>
            <div className="space-y-4">
              {question.entities.filter(e => e.status === "design").map(e => (
                <div key={e.id} className="p-5 bg-amber-500/10 border border-amber-500/30 rounded-2xl">
                  <div className="flex items-center gap-3 mb-2">
                    <StatusBadge status="design" />
                    <code className="text-amber-300 font-bold">{e.label}</code>
                  </div>
                  <div className="text-white text-lg font-semibold mb-1">{e.subtitle}</div>
                  <div className="text-zinc-400 text-sm">Existe la tabla, pero el dato vive en un formato que no permite analítica directa. Es decisión de producto, no falla.</div>
                </div>
              ))}
              {question.entities.filter(e => e.status === "missing").map(e => (
                <div key={e.id} className="p-5 bg-red-500/10 border border-red-500/30 border-dashed rounded-2xl">
                  <div className="flex items-center gap-3 mb-2">
                    <StatusBadge status="missing" />
                    <code className="text-red-300 font-bold">{e.label}</code>
                  </div>
                  <div className="text-white text-lg font-semibold mb-2">{e.subtitle}</div>
                  <div className="text-zinc-300 text-sm mb-3">Estructura propuesta:</div>
                  <ul className="space-y-1">
                    {e.columns.map((c, i) => <li key={i} className="text-xs text-zinc-300 font-mono">• {c}</li>)}
                  </ul>
                </div>
              ))}
              {question.designDecision && (
                <div className="p-5 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl">
                  <div className="text-xs font-bold text-emerald-400 tracking-widest mb-2">DECISIÓN A TOMAR CON EL CLIENTE</div>
                  <p className="text-white leading-relaxed">{question.designDecision}</p>
                </div>
              )}
            </div>
          </Panel>
        );
      }

      return null;
    };

    const App = () => {
      const [selectedId, setSelectedId] = useState(null);
      const [stage, setStage] = useState(0); // 0=picker, 1=question shown, 2=greens, 3=+yellows, 4=+reds
      const [openPanel, setOpenPanel] = useState(null); // 'sql' | 'translation' | 'gaps'
      const [liveQuestion, setLiveQuestion] = useState(null);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analyzeError, setAnalyzeError] = useState(null);
      const [apiKey, setApiKey] = useState(() => {
        try {
          const fromStorage = localStorage.getItem("claude_api_key");
          if (fromStorage) return fromStorage;
          if (typeof window !== "undefined" && window.LOCAL_API_KEY) {
            localStorage.setItem("claude_api_key", window.LOCAL_API_KEY);
            return window.LOCAL_API_KEY;
          }
          return "";
        } catch {
          return (typeof window !== "undefined" && window.LOCAL_API_KEY) || "";
        }
      });
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [activeSchema, setActiveSchema] = useState(() => {
        try {
          const raw = localStorage.getItem("claude_active_schema");
          return raw ? JSON.parse(raw) : null;
        } catch { return null; }
      });
      const [showSchemaModal, setShowSchemaModal] = useState(false);
      const [isProcessingSchema, setIsProcessingSchema] = useState(false);
      const [schemaError, setSchemaError] = useState(null);
      const [liveArchitecture, setLiveArchitecture] = useState(null);
      const [isAnalyzingArch, setIsAnalyzingArch] = useState(false);
      const [archError, setArchError] = useState(null);
      const [liveVisualization, setLiveVisualization] = useState(null);
      const [isAnalyzingViz, setIsAnalyzingViz] = useState(false);
      const [vizError, setVizError] = useState(null);
      const [showTour, setShowTour] = useState(() => {
        try { return !localStorage.getItem("claude_qfdb_tour_seen"); } catch { return true; }
      });
      const closeTour = () => {
        setShowTour(false);
        try { localStorage.setItem("claude_qfdb_tour_seen", "1"); } catch {}
      };

      const revealTimers = useRef([]);
      const clearRevealTimers = () => {
        revealTimers.current.forEach(clearTimeout);
        revealTimers.current = [];
      };
      // Limpiar timers pendientes si el componente se desmonta a mitad de la animación
      useEffect(() => clearRevealTimers, []);

      const question = selectedId && selectedId.startsWith("live-")
        ? liveQuestion
        : QUESTIONS.find(q => q.id === selectedId);

      const reset = () => {
        clearRevealTimers();
        setSelectedId(null); setStage(0); setOpenPanel(null);
      };

      const startReveal = (id) => {
        // Cancelar cualquier reveal en curso para evitar timeouts viejos
        // disparando setStage sobre una pregunta nueva (race condition).
        clearRevealTimers();
        setSelectedId(id);
        setStage(1);
        setOpenPanel(null);
        revealTimers.current = [
          setTimeout(() => setStage(2), REVEAL_TIMING_MS.greens),
          setTimeout(() => setStage(3), REVEAL_TIMING_MS.yellows),
          setTimeout(() => setStage(4), REVEAL_TIMING_MS.all),
        ];
      };

      const pickQuestion = (id) => startReveal(id);

      const handleAnalyze = async (text) => {
        setIsAnalyzing(true);
        setAnalyzeError(null);
        try {
          const customKnowledge = activeSchema?.knowledgePrompt || null;
          const parsed = await analyzeWithClaude(text, apiKey, customKnowledge);
          setLiveQuestion(parsed);
          startReveal(parsed.id);
        } catch (err) {
          setAnalyzeError(err.message || String(err));
        } finally {
          setIsAnalyzing(false);
        }
      };

      const saveKey = (k) => {
        setApiKey(k);
        try { localStorage.setItem("claude_api_key", k); } catch {}
        setShowKeyModal(false);
      };

      const handleProcessSchema = async (input) => {
        if (!apiKey) { setShowSchemaModal(false); setShowKeyModal(true); return; }
        setIsProcessingSchema(true);
        setSchemaError(null);
        try {
          const parsed = await processSchema(input, apiKey);
          setActiveSchema(parsed);
          try { localStorage.setItem("claude_active_schema", JSON.stringify(parsed)); } catch {}
          setShowSchemaModal(false);
          reset();
        } catch (err) {
          setSchemaError(err.message || String(err));
        } finally {
          setIsProcessingSchema(false);
        }
      };

      const clearActiveSchema = () => {
        setActiveSchema(null);
        try { localStorage.removeItem("claude_active_schema"); } catch {}
        reset();
      };

      const handleOpenArchitecture = async () => {
        if (!question) return;
        // Si ya tiene architectureAnalysis pre-cargado (pre-cargadas), solo abre panel
        if (question.architectureAnalysis) {
          setOpenPanel("architecture");
          return;
        }
        // Si ya hicimos la llamada antes para esta live question, reusar
        if (liveArchitecture && liveArchitecture.forQuestionId === question.id) {
          setOpenPanel("architecture");
          return;
        }
        // Live question sin análisis previo — llamar a Claude
        if (!apiKey) { setShowKeyModal(true); return; }
        setIsAnalyzingArch(true);
        setArchError(null);
        try {
          const customKnowledge = activeSchema?.knowledgePrompt || null;
          const result = await analyzeArchitecture(question, apiKey, customKnowledge);
          result.forQuestionId = question.id;
          setLiveArchitecture(result);
          setOpenPanel("architecture");
        } catch (err) {
          setArchError(err.message || String(err));
          setOpenPanel("architecture");
        } finally {
          setIsAnalyzingArch(false);
        }
      };

      const currentArchitecture = question?.architectureAnalysis
        || (liveArchitecture?.forQuestionId === question?.id ? liveArchitecture : null);

      const handleOpenVisualization = async () => {
        if (!question) return;
        if (liveVisualization && liveVisualization.forQuestionId === question.id) {
          setOpenPanel("visualization");
          return;
        }
        if (!apiKey) { setShowKeyModal(true); return; }
        setIsAnalyzingViz(true);
        setVizError(null);
        try {
          const customKnowledge = activeSchema?.knowledgePrompt || null;
          const result = await analyzeVisualization(question, apiKey, customKnowledge);
          result.forQuestionId = question.id;
          setLiveVisualization(result);
          setOpenPanel("visualization");
        } catch (err) {
          setVizError(err.message || String(err));
          setOpenPanel("visualization");
        } finally {
          setIsAnalyzingViz(false);
        }
      };

      const currentVisualization = liveVisualization?.forQuestionId === question?.id ? liveVisualization : null;

      const hasYellows = question?.entities.some(e => e.status === "design");
      const hasReds    = question?.entities.some(e => e.status === "missing");

      return (
        <div className="min-h-screen bg-gradient-to-br from-zinc-950 via-zinc-950 to-black">
          <header className="border-b border-zinc-900 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-3 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-2 sm:gap-3">
              <div onClick={reset} className="cursor-pointer flex items-center gap-2 sm:gap-3 group min-w-0">
                <div className="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-amber-500 flex items-center justify-center font-black text-zinc-950 text-lg sm:text-xl group-hover:scale-105 transition-transform flex-shrink-0">M</div>
                <div className="min-w-0">
                  <div className="text-base sm:text-lg font-bold text-white leading-tight truncate">Question-First DB</div>
                  <div className="hidden sm:block text-xs text-zinc-500 truncate">La pregunta define el diseño de la BD</div>
                </div>
              </div>
              <div className="flex items-center gap-1.5 sm:gap-2 flex-shrink-0">
                <button
                  onClick={() => setShowTour(true)}
                  className="text-xs text-zinc-400 hover:text-white border border-zinc-800 hover:border-zinc-600 rounded-full w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center transition-colors font-bold"
                  title="¿Cómo funciona? — Reabrir el tour guiado"
                  aria-label="Reabrir tour"
                >?</button>
                <button
                  onClick={() => setShowSchemaModal(true)}
                  className="text-xs text-emerald-300 hover:text-emerald-200 border border-emerald-500/30 hover:border-emerald-500/60 rounded-full px-2.5 sm:px-3 py-1.5 transition-colors flex items-center gap-1.5"
                  title="Cargar el esquema de tu BD (DDL, texto o imagen)"
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/></svg>
                  <span className="hidden sm:inline">Mi BD</span>
                </button>
                <button
                  onClick={() => setShowKeyModal(true)}
                  className="text-xs text-zinc-400 hover:text-white border border-zinc-800 hover:border-zinc-600 rounded-full px-2.5 sm:px-3 py-1.5 transition-colors flex items-center gap-1.5"
                  title="Configurar API key de Claude"
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  <span className="hidden sm:inline">{apiKey ? "API key ✓" : "API key"}</span>
                  <span className="sm:hidden">{apiKey ? "✓" : "key"}</span>
                </button>
                {question && (
                  <button onClick={reset} className="text-xs sm:text-sm text-zinc-400 hover:text-white border border-zinc-800 hover:border-zinc-600 rounded-full px-3 sm:px-4 py-1.5 sm:py-2 transition-colors">
                    <span className="hidden sm:inline">← Otra pregunta</span>
                    <span className="sm:hidden">←</span>
                  </button>
                )}
              </div>
            </div>
          </header>
          {activeSchema && (
            <SchemaBanner
              schema={activeSchema}
              onChange={() => setShowSchemaModal(true)}
              onClear={clearActiveSchema}
            />
          )}

          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
            {!question && (
              <LandingScreen
                activeSchema={activeSchema}
                apiKey={apiKey}
                isAnalyzing={isAnalyzing}
                analyzeError={analyzeError}
                onAnalyze={handleAnalyze}
                onRequestKey={() => setShowKeyModal(true)}
                onPickQuestion={pickQuestion}
              />
            )}

            {question && (
              <QuestionRevealScreen
                question={question}
                stage={stage}
                isAnalyzingArch={isAnalyzingArch}
                isAnalyzingViz={isAnalyzingViz}
                hasYellows={hasYellows}
                hasReds={hasReds}
                onOpenPanel={setOpenPanel}
                onOpenArchitecture={handleOpenArchitecture}
                onOpenVisualization={handleOpenVisualization}
              />
            )}
          </main>

          <PanelManager
            openPanel={openPanel}
            onClose={() => setOpenPanel(null)}
            question={question}
            currentArchitecture={currentArchitecture}
            currentVisualization={currentVisualization}
            archError={archError}
            vizError={vizError}
          />
          {showKeyModal && (
            <ApiKeyModal
              initialKey={apiKey}
              onSave={saveKey}
              onClose={() => setShowKeyModal(false)}
            />
          )}

          {showSchemaModal && (
            <SchemaContextModal
              onSubmit={handleProcessSchema}
              onClose={() => { setShowSchemaModal(false); setSchemaError(null); }}
              isProcessing={isProcessingSchema}
              error={schemaError}
            />
          )}

          {showTour && <WelcomeTour onClose={closeTour} />}

          <footer className="border-t border-zinc-900 mt-16 py-6">
            <div className="max-w-7xl mx-auto px-6 text-center text-xs text-zinc-600 space-y-1.5">
              <div>
                La Pregunta Define la BD · workshop tool · open source MIT
              </div>
              <div className="flex items-center justify-center gap-3 flex-wrap text-zinc-700">
                <span>Construido con Claude · React · Tailwind</span>
                <span>·</span>
                <a href="https://crearia.co" target="_blank" rel="noopener" className="hover:text-emerald-400 transition-colors">CrearIA</a>
                <span>·</span>
                <a href="https://github.com/ocuellar09/question-first-db" target="_blank" rel="noopener" className="hover:text-emerald-400 transition-colors">GitHub</a>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
