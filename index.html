  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useMemo } = React;

    // ============================================================
    // CONSTANTES — config global del comportamiento de la app
    // ============================================================
    const REVEAL_TIMING_MS = {
      greens:  1400,  // delay para mostrar entidades VERDES tras seleccionar pregunta
      yellows: 2900,  // delay para sumar las AMARILLAS (decisión de diseño)
      all:     4200,  // delay final para sumar ROJAS + botones de acción
    };

    const CLAUDE_API = {
      url:     "https://api.anthropic.com/v1/messages",
      version: "2023-06-01",
      model:   "claude-sonnet-4-6",
    };

    // ============================================================
    // callClaudeJSON — única función fetch a Claude, reutilizada
    // por las 4 capas (analyze/architecture/visualization/schema)
    // ============================================================
    const callClaudeJSON = async ({ apiKey, system, userContent, maxTokens = 3000, useCache = false }) => {
      const systemField = useCache && typeof system === "string"
        ? [{ type: "text", text: system, cache_control: { type: "ephemeral" } }]
        : system;
      const response = await fetch(CLAUDE_API.url, {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": CLAUDE_API.version,
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: CLAUDE_API.model,
          max_tokens: maxTokens,
          system: systemField,
          messages: [{ role: "user", content: userContent }],
        }),
      });
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API ${response.status}: ${errText.slice(0, 300)}`);
      }
      const data = await response.json();
      const raw = (data.content?.[0]?.text || "").trim()
        .replace(/^```json\s*/i, "").replace(/^```\s*/, "").replace(/\s*```$/, "");
      try {
        return JSON.parse(raw);
      } catch {
        throw new Error(`No se pudo parsear el JSON de Claude. Texto crudo:\n${raw.slice(0, 500)}`);
      }
    };

    // ============================================================
    // DATA — Las preguntas pre-cargadas del taller
    // Cada pregunta describe: keywords, entities (con status), connections, SQL, traducción
    // ============================================================
    const QUESTIONS = [
      {
        id: "q1-seed",
        title: "Pregunta 1 — La seed",
        text: "De los coachees que iniciaron el programa con MIA, ¿cómo va el avance de cada uno?",
        keywords: ["coachees", "iniciaron", "programa", "avance"],
        entities: [
          { id: "tenants",            label: "tenants",              subtitle: "slug='mia'",            status: "existing", col: 1, row: 1, columns: ["id", "slug", "name"] },
          { id: "courses",            label: "courses",              subtitle: "el programa",            status: "existing", col: 2, row: 1, columns: ["id", "tenant_id", "title", "is_active"] },
          { id: "course_enrollments", label: "course_enrollments",   subtitle: "cada coachee",           status: "existing", col: 3, row: 1, columns: ["id", "course_id", "student_phone", "status", "enrolled_at"] },
          { id: "course_modules",     label: "course_modules",       subtitle: "los módulos",            status: "existing", col: 2, row: 2, columns: ["id", "course_id", "order", "module_type"] },
          { id: "student_progress",   label: "student_progress",     subtitle: "avance por módulo",      status: "existing", col: 3, row: 2, columns: ["enrollment_id", "module_id", "status", "completed_at"] },
          { id: "conversation_insights", label: "conversation_insights", subtitle: "avance NARRATIVO", status: "design",   col: 4, row: 2, columns: ["enrollment_id", "comprehension_level (low|mid|high)", "evolution_notes (TEXTO)"] },
        ],
        connections: [
          { from: "tenants", to: "courses" },
          { from: "courses", to: "course_enrollments" },
          { from: "courses", to: "course_modules" },
          { from: "course_enrollments", to: "student_progress" },
          { from: "course_modules", to: "student_progress" },
          { from: "course_enrollments", to: "conversation_insights" },
        ],
        sql:
`SELECT
  ce.student_name,
  ce.enrolled_at,
  c.title AS programa,
  COUNT(sp.id) FILTER (WHERE sp.status='completed') AS modulos_completados,
  COUNT(cm.id) AS modulos_totales,
  ROUND(100.0 * COUNT(sp.id) FILTER (WHERE sp.status='completed')
        / NULLIF(COUNT(cm.id),0), 1) AS pct_avance
FROM course_enrollments ce
JOIN tenants t         ON t.id = ce.tenant_id
JOIN courses c         ON c.id = ce.course_id
JOIN course_modules cm ON cm.course_id = c.id
LEFT JOIN student_progress sp
       ON sp.enrollment_id = ce.id
      AND sp.module_id    = cm.id
WHERE t.slug = 'mia' AND ce.status = 'active'
GROUP BY ce.id, c.id
ORDER BY pct_avance DESC NULLS LAST;`,
        translation: "MIA te dice exactamente quién va en qué módulo y qué porcentaje completó. La parte AMARILLA — el avance como concepto profundo — vive como narrativa en conversation_insights. No es un número del 1 al 10, es texto enriquecido. Si quieres KPI numérico, hay que diseñarlo. Es decisión de producto, no falla técnica.",
        designDecision: "MIA cuenta historia, no calcula KPI. Para tener scoring numérico hay que agregar columnas estructuradas (ej. progress_score INT, goal_alignment DECIMAL) a conversation_insights.",
        plainSummary: "Para responder esto MIA necesita saber 4 cosas: QUIÉN es cada coachee, EN QUÉ programa está, QUÉ módulos lleva completados, y QUÉ tan profunda ha sido la conversación. Las 3 primeras las tiene como datos duros (verde). La cuarta vive como notas escritas, no como un puntaje (amarillo).",
        concreteExample: "Ejemplo concreto: 'María Gómez, programa Liderazgo Consciente, lleva 4 de 7 módulos completados, último acceso ayer. En notas: \"María mostró un click importante al hablar de delegar — necesita más práctica en feedback directo\".'",
        architectureAnalysis: {
          summary: "Las verdes ya están listas. La amarilla (conversation_insights) NO debe quedarse como texto libre: hay que snapshot-ear semanalmente y extraer features cuantitativas para entrenar el modelo más valioso del producto (detector de breakthrough + predictor de abandono).",
          items: [
            {
              entityId: "conversation_insights",
              recommendation: "snapshot",
              reasoning: "La comprensión EVOLUCIONA a lo largo del programa. Sin snapshots semanales pierdes la curva — solo tienes el último valor. Sin curva no hay tendencia, sin tendencia no hay modelo predictivo.",
              mlRelevance: "critical",
              mlContext: "Modelo de detección de 'momento de breakthrough' (cuándo el coachee tuvo el insight clave) + modelo de churn (correlación entre estancamiento narrativo y abandono futuro)"
            },
            {
              entityId: "student_progress",
              recommendation: "materialize",
              reasoning: "Ya está materializada. Solo agregar snapshots semanales del % avance por coachee para tener serie temporal limpia.",
              mlRelevance: "useful",
              mlContext: "Feature primario: el ritmo de avance es el predictor #1 de éxito en programas educativos"
            }
          ]
        }
      },
      {
        id: "q2-completion",
        title: "Pregunta 2 — Completion del programa",
        text: "¿Qué porcentaje de coachees completó el programa entero?",
        keywords: ["porcentaje", "coachees", "completó", "programa"],
        entities: [
          { id: "tenants",            label: "tenants",            subtitle: "slug='mia'",           status: "existing", col: 1, row: 1, columns: ["id", "slug"] },
          { id: "course_enrollments", label: "course_enrollments", subtitle: "completed_at = manual", status: "design",   col: 2, row: 1, columns: ["id", "status", "enrolled_at", "completed_at (MANUAL)"] },
          { id: "student_progress",   label: "student_progress",   subtitle: "completion por módulo",  status: "existing", col: 3, row: 1, columns: ["enrollment_id", "module_id", "status"] },
          { id: "auto_completion_trigger", label: "auto-completion rule", subtitle: "FALTA", status: "missing", col: 2, row: 2, columns: ["IF todos modulos.status='completed'", "THEN enrollment.completed_at = NOW()"] },
        ],
        connections: [
          { from: "tenants", to: "course_enrollments" },
          { from: "course_enrollments", to: "student_progress" },
          { from: "student_progress", to: "auto_completion_trigger" },
          { from: "auto_completion_trigger", to: "course_enrollments" },
        ],
        sql:
`-- Lo que SE PUEDE responder hoy (manual):
SELECT
  COUNT(*) FILTER (WHERE completed_at IS NOT NULL) * 100.0 / COUNT(*) AS pct_completado
FROM course_enrollments ce
JOIN tenants t ON t.id = ce.tenant_id
WHERE t.slug = 'mia';

-- PROBLEMA: completed_at se setea a mano.
-- Resultado: el % refleja "quién marcamos como completo", no "quién completó de verdad".

-- Lo que DEBERÍA pasar (cálculo derivado):
SELECT
  COUNT(DISTINCT ce.id) FILTER (
    WHERE NOT EXISTS (
      SELECT 1 FROM course_modules cm
      LEFT JOIN student_progress sp
        ON sp.enrollment_id = ce.id AND sp.module_id = cm.id
      WHERE cm.course_id = ce.course_id
        AND (sp.status IS NULL OR sp.status != 'completed')
    )
  ) * 100.0 / COUNT(DISTINCT ce.id) AS pct_completado_real
FROM course_enrollments ce
JOIN tenants t ON t.id = ce.tenant_id
WHERE t.slug = 'mia';`,
        translation: "Hoy MIA tiene la columna 'completed_at' pero NADIE la pone automáticamente. Una persona tiene que entrar al admin y marcar manualmente. Entonces tu reporte de completion refleja 'a quién marcamos', no 'quién realmente terminó'. Eso es un GAP estructural — necesitas una regla automática que cierre el enrollment cuando los módulos estén todos completos.",
        designDecision: "Agregar un background job o un trigger en la BD: cuando StudentProgress llega a 'completed' en el último módulo del curso, actualizar CourseEnrollment.completed_at automáticamente.",
        plainSummary: "Para responder esto MIA necesita saber: quién se inscribió, y de esos quién terminó. La parte 'quién terminó' es donde está el problema: hoy alguien tiene que poner una marca a mano. Si nadie la pone, parece que nadie completó — aunque sí completaron.",
        concreteExample: "Imagínate: 10 coachees terminaron los 7 módulos del programa la semana pasada. Si el admin no entró a marcarlos como 'completados', tu reporte dice '0% completaron'. La realidad: 100% completaron. La regla automática elimina ese error.",
        architectureAnalysis: {
          summary: "completed_at debe materializarse vía TRIGGER automático, no calcularse runtime. Es un evento de negocio que dispara acciones (diploma, billing, comunicaciones) y además es el TARGET principal del modelo de churn.",
          items: [
            {
              entityId: "course_enrollments",
              recommendation: "materialize",
              reasoning: "completed_at NO es solo un dato derivable — es un EVENTO de negocio. Cuando se setea, debe disparar acciones (envío de diploma, cobro del siguiente período, encuesta NPS). Si lo calculas runtime, no tienes momento de transición que capturar.",
              mlRelevance: "critical",
              mlContext: "Es el target principal para entrenar modelo de churn supervisado: 'estos features predicen completion=true vs false'. Sin completed_at limpio el modelo no tiene labels"
            },
            {
              entityId: "auto_completion_trigger",
              recommendation: "new_rule",
              reasoning: "No es tabla, es regla de negocio. Implementar como trigger postgres O como cron diario en backend que evalúa: SI todos los modules.status='completed' ENTONCES setear enrollment.completed_at=NOW() + emit evento 'course_completed'.",
              mlRelevance: "useful",
              mlContext: "El evento 'course_completed' poblado consistentemente es lo que permite calcular completion rate por cohorte/programa/coach — features de segundo orden para modelos de coaching"
            }
          ]
        }
      },
      {
        id: "q3-goal",
        title: "Pregunta 3 — Objetivo declarado",
        text: "¿Qué objetivo declaró cada coachee al inicio del programa?",
        keywords: ["objetivo", "declaró", "coachee", "inicio"],
        entities: [
          { id: "tenants",            label: "tenants",            subtitle: "slug='mia'",                   status: "existing", col: 1, row: 1, columns: ["id", "slug"] },
          { id: "course_enrollments", label: "course_enrollments", subtitle: "onboarding_data = JSON libre", status: "design",   col: 2, row: 1, columns: ["id", "student_phone", "onboarding_data (JSONB sin schema)"] },
          { id: "coachee_goals",      label: "coachee_goals",      subtitle: "FALTA — tabla nueva",          status: "missing", col: 3, row: 1, columns: ["id", "enrollment_id FK", "goal_category", "goal_text", "target_date", "measurable_outcome"] },
          { id: "goal_progress",      label: "goal_progress",      subtitle: "FALTA — tracking",              status: "missing", col: 3, row: 2, columns: ["goal_id FK", "checkpoint_date", "score (0-100)", "evidence_summary"] },
        ],
        connections: [
          { from: "tenants", to: "course_enrollments" },
          { from: "course_enrollments", to: "coachee_goals" },
          { from: "coachee_goals", to: "goal_progress" },
        ],
        sql:
`-- Lo que se PUEDE leer hoy (JSON libre, sin schema):
SELECT
  ce.student_name,
  jsonb_pretty(ce.onboarding_data::jsonb) AS onboarding_raw
FROM course_enrollments ce
JOIN tenants t ON t.id = ce.tenant_id
WHERE t.slug = 'mia' AND ce.onboarding_data IS NOT NULL;

-- PROBLEMA: cada coachee puede tener su objetivo escrito de forma distinta,
-- en cualquier campo del JSON. Imposible agrupar, categorizar o medir avance.

-- Lo que necesitaríamos crear:
CREATE TABLE coachee_goals (
  id              UUID PRIMARY KEY,
  enrollment_id   UUID REFERENCES course_enrollments(id) ON DELETE CASCADE,
  goal_category   VARCHAR(50),   -- 'liderazgo' | 'comunicacion' | 'gestion_tiempo' | ...
  goal_text       TEXT,          -- texto narrativo del coachee
  target_date     DATE,
  measurable_outcome TEXT,       -- 'sostener 3 reuniones difíciles sin escalar'
  declared_at     TIMESTAMP DEFAULT NOW()
);`,
        translation: "Hoy MIA guarda lo que el coachee dice en su primer mensaje como un JSON sin estructura. Cada coachee tiene su objetivo escrito a su manera y en cualquier lugar del JSON. No puedes preguntar 'cuántos coachees vienen por liderazgo' ni 'cuántos lograron su objetivo'. Como dice el dicho del taller: una columna en JSON es una decisión postergada. Esto es ROADMAP claro.",
        designDecision: "Crear tabla coachee_goals con categoría + texto + outcome medible. Y una segunda tabla goal_progress para tracking. Esto convierte coaching narrativo en coaching medible sin perder la narrativa.",
        plainSummary: "Para responder esto MIA necesita saber: cuál fue el objetivo que el coachee declaró al inicio. Hoy esa información sí se captura — pero queda guardada como texto suelto, no como un dato que se pueda contar o agrupar. Es como tener mil cartas escritas a mano en una caja: la info está, pero no la puedes graficar.",
        concreteExample: "Imagínate que María dijo 'quiero ser mejor líder', Pedro dijo 'mejorar mi comunicación', y Ana dijo 'gestionar mi tiempo'. Hoy esos textos viven sueltos. NO puedes responder '¿cuántos coachees vienen por temas de liderazgo este trimestre?' — aunque la respuesta esté ahí.",
        architectureAnalysis: {
          summary: "Acá las dos faltantes son CRÍTICAS para ML. coachee_goals va materializada con categoría enum (no texto libre) — sirve para segmentación + recomendación. goal_progress va como snapshot semanal append-only — sin esto no entrenas modelos de 'tiempo a meta' ni detectas estancamientos.",
          items: [
            {
              entityId: "course_enrollments",
              recommendation: "runtime",
              reasoning: "El JSON crudo en onboarding_data NO debe usarse para analítica. Hay que extraer el objetivo y materializarlo en tabla aparte (ver coachee_goals). El JSON queda solo como respaldo del input original.",
              mlRelevance: "low",
              mlContext: "JSON sin schema NO es feature usable para ML. Hay que normalizarlo a tabla estructurada primero"
            },
            {
              entityId: "coachee_goals",
              recommendation: "materialize",
              reasoning: "Tabla nueva con goal_category ENUM ('liderazgo', 'comunicacion', etc), goal_text libre, target_date, measurable_outcome. Sin enum no hay group-by. Sin tabla no hay JOIN con outcomes. Es el feature de PERSONALIZACIÓN del producto.",
              mlRelevance: "critical",
              mlContext: "Clustering de coachees por tipo de objetivo + sistema de recomendación de programa según objetivo declarado + análisis de demanda por categoría para roadmap de contenido"
            },
            {

    // ============================================================
    // imageToBase64 — File → base64 sin prefijo data:
    // ============================================================
    const imageToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        const base64 = String(result).split(",")[1];
        resolve({ data: base64, mediaType: file.type });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // ============================================================
    // processSchema — convierte DDL/texto/imagen en knowledge base
    // ============================================================
    const processSchema = async ({ type, text, image }, apiKey) => {
      const userContent = type === "image" && image
        ? [
            { type: "image", source: { type: "base64", media_type: image.mediaType, data: image.data } },
            { type: "text", text: "Esta imagen es el diagrama/ERD de una base de datos. Analízalo y devuelve el JSON con name, summary, tablesCount y knowledgePrompt según el schema indicado en system." }
          ]
        : `Esquema recibido (${type === "ddl" ? "DDL/SQL" : "descripción libre"}):\n\n\`\`\`\n${text}\n\`\`\`\n\nDevuelve el JSON ahora.`;

      const parsed = await callClaudeJSON({
        apiKey,
        system: SCHEMA_PROCESSING_PROMPT,
        userContent,
        maxTokens: 4000,
      });

      if (parsed.error) throw new Error(parsed.error);
      if (!parsed.knowledgePrompt) throw new Error("Respuesta sin knowledgePrompt válido.");

      parsed.processedAt = new Date().toISOString();
      parsed.sourceType = type;
      return parsed;
    };

    // ============================================================
    // ARCHITECTURE_PROMPT — analiza decisiones de guardar/calcular/snapshot
    // con lente ML-ready sobre los gaps de una pregunta ya analizada

    const ARCHITECTURE_PROMPT = `Eres un arquitecto de datos senior con experiencia en plataformas de ML. Recibirás una pregunta de negocio que YA fue descompuesta en entidades (verdes=existen, amarillas=decisión de diseño, rojas=faltan). Tu trabajo: para cada entidad AMARILLA o ROJA, decidir CÓMO debería existir el dato — y advertir si es crítico para ML futuro.

Devuelve ÚNICAMENTE JSON válido (sin markdown, sin texto fuera):
{
  "summary": "<1-2 frases tipo gerente: cuál es la decisión arquitectónica más importante de esta pregunta>",
  "items": [
    {
      "entityId": "<id de la entidad amarilla o roja>",
      "recommendation": "runtime" | "materialize" | "snapshot" | "new_rule",
      "reasoning": "<1-2 frases: POR QUÉ esa recomendación>",
      "mlRelevance": "critical" | "useful" | "low",
      "mlContext": "<qué modelo concreto se beneficia: predicción de churn, recomendación de X, clustering de Y, etc. Vacío si mlRelevance=low>"

  ]

CRITERIOS DE 'recommendation':
- "runtime": calcular al vuelo en backend, no persistir. Bueno cuando: la fórmula cambia, no hay history, el dato siempre es derivable barato
- "materialize": columna o tabla con valor actual persistido (puede tener trigger). Bueno cuando: dispara eventos de negocio, se lee muchísimo, es un EVENTO con momento de transición
- "snapshot": tabla append-only con timestamps periódicos. Bueno cuando: necesitas historia, tendencias, training data para ML, audit trail, time-travel
- "new_rule": no es tabla — es lógica de negocio (trigger postgres, cron, background job). Bueno cuando: es automatización detrás de un materialize

CRITERIOS DE 'mlRelevance':
- "critical": sin este dato persistido NO se puede entrenar el modelo más valioso del dominio
- "useful": útil como feature secundario o validador, pero no es el target ni feature primario
- "low": probablemente no se use para ML (datos de configuración, lookup tables, etc.)

REGLAS:
1. Solo analiza entidades con status="design" o status="missing". Ignora las verdes.
2. Si todas las entidades son verdes, items=[] y summary explica qué ML next-step sería el natural a partir de esta data ya disponible.
3. Sé directo. Sin hedging.
4. mlContext debe nombrar un MODELO CONCRETO con su tipo (clasificación, regresión, clustering, recomendación, NLP), no genéricos.`;

        apiKey,
        system: ARCHITECTURE_PROMPT + (customKnowledge ? "\n\n# CONTEXTO DE DOMINIO:\n" + customKnowledge.slice(0, 2000) : ""),
        userContent: `Análisis arquitectónico para:\n\n${JSON.stringify(userPayload, null, 2)}\n\nDevuelve el JSON ahora.`,
        maxTokens: 2500,
      });
      if (!parsed.items) parsed.items = [];
      return parsed;
    };

    // ============================================================
    // VISUALIZATION_PROMPT — sugiere gráficos/KPIs para el "dashboard imaginado"
    // ============================================================
    const VISUALIZATION_PROMPT = `Eres un experto en data visualization. Recibirás una pregunta de negocio + lista de entidades involucradas. Tu trabajo: proponer 1 o 2 gráficos/KPIs que serían el "dashboard imaginado" que el cliente tendría si la BD estuviera bien modelada para responder esta pregunta.

Devuelve ÚNICAMENTE JSON válido (sin markdown):
{
  "summary": "<1-2 frases tipo gerente: qué dashboard tendrías si modelas bien>",
  "charts": [
    {
      "chartType": "line" | "bar" | "horizontal_bar" | "funnel" | "kpi_card" | "heatmap",
      "title": "<título corto del gráfico>",
      "subtitle": "<unidad/contexto: 'semanal', 'últimos 30 días', etc>",
      "insight": "<insight ACCIONABLE de leer este gráfico, ej 'Si X cae por debajo de Y, intervenir Z'>",
      "mockData": <schema según chartType>
    }
  ]
}

SCHEMAS DE mockData (estrictos, NO mezclar):
- line: [{ "x": "string label", "y": number }] (5-12 puntos)
- bar / horizontal_bar: [{ "label": "string", "value": number }] (3-8 items)
- funnel: [{ "stage": "string", "value": number }] (3-6 stages, valores DECRECIENTES)
- kpi_card: { "value": "string formateado (ej '37%', '142', '$3.4k', '4.2/5')", "label": "string corto", "trend": "string opcional (ej '+5pp', '-12')", "trendDirection": "up"|"down"|"flat", "sparkline": [number,number,...] (7-12 puntos opcionales) }
- heatmap: { "rows": [string], "cols": [string], "values": [[number,...],...] } (3-5 rows, 3-7 cols, valores 0-100 representando intensidad)

CRITERIOS PARA ELEGIR chartType:
- Conteo o porcentaje único actual → kpi_card
- Evolución temporal → line
- Comparación entre categorías discretas → bar / horizontal_bar
- Conversión/abandono por etapas secuenciales → funnel
- Cruce 2D (perfil × módulo, por ejemplo) → heatmap

REGLAS:
1. Mínimo 1 chart, máximo 2 por pregunta (si la pregunta justifica 2 vistas complementarias)
2. mockData REALISTA al dominio detectado: si es coaching, nombres como María, Pedro, módulos plausibles. Si es e-commerce, montos en moneda creíble.
3. Si la pregunta es sobre un solo KPI claro, el primer chart DEBE ser kpi_card. El segundo puede ser line para mostrar evolución.
4. insight = acción concreta, no descripción genérica
5. NO inventes chart types fuera del enum`;

    // ============================================================
    // analyzeVisualization — segunda llamada a Claude para el dashboard
    // ============================================================
    const analyzeVisualization = async (question, apiKey, customKnowledge = null) => {
      const userPayload = {
        question: question.text,
        entities: question.entities.map(e => ({ id: e.id, status: e.status, subtitle: e.subtitle })),
      };
      const parsed = await callClaudeJSON({
        apiKey,
        system: VISUALIZATION_PROMPT + (customKnowledge ? "\n\n# CONTEXTO DE DOMINIO:\n" + customKnowledge.slice(0, 2000) : ""),
        userContent: `Dashboard imaginado para:\n\n${JSON.stringify(userPayload, null, 2)}\n\nDevuelve el JSON ahora.`,
        maxTokens: 2500,
      });
      if (!parsed.charts || !Array.isArray(parsed.charts)) parsed.charts = [];
      return parsed;
    };

    // ============================================================
    // analyzeWithClaude — llama a Claude API desde el browser
    // ============================================================
    const analyzeWithClaude = async (questionText, apiKey, customKnowledge = null) => {
      const parsed = await callClaudeJSON({
        apiKey,
        system: customKnowledge || SCHEMA_KNOWLEDGE,
        userContent: `Pregunta del cliente: "${questionText}"\n\nDevuelve el JSON ahora, sin nada más.`,
        maxTokens: 3000,
        useCache: true,
      });

      if (!parsed.entities || !Array.isArray(parsed.entities) || parsed.entities.length === 0) {
        throw new Error("Claude devolvió una respuesta sin entidades válidas.");
      }
      parsed.id = `live-${Date.now()}`;
      parsed.title = parsed.title || "Pregunta del cliente";
      return parsed;
    };

    // ============================================================
    // UTILS — Sequenced reveal
    // ============================================================
    const useSequenced = (items, intervalMs, enabled) => {
      const [visibleCount, setVisibleCount] = useState(0);
      useEffect(() => {
        if (!enabled) { setVisibleCount(0); return; }
        setVisibleCount(0);
        const timers = items.map((_, i) =>
          setTimeout(() => setVisibleCount((c) => Math.max(c, i + 1)), i * intervalMs)
        );
        return () => timers.forEach(clearTimeout);
      }, [enabled, items.length, intervalMs]);
      return visibleCount;
    };

    // ============================================================
    // COMPONENTS
    // ============================================================
    const StatusBadge = ({ status }) => {
      const map = {
        existing: { bg: "bg-emerald-500", text: "EXISTE",   icon: "check" },
        design:   { bg: "bg-amber-500",   text: "DECISIÓN", icon: "alert" },
        missing:  { bg: "bg-red-500",     text: "FALTA",    icon: "x" },
      };
      const s = map[status];
      return (
        <div className={`${s.bg} text-zinc-950 px-2.5 py-1 rounded-full text-[10px] font-bold tracking-wider inline-flex items-center gap-1.5 shadow-lg w-fit`}>
          {s.icon === "check" && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><polyline points="20 6 9 17 4 12"/></svg>}
          {s.icon === "alert" && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>}
          {s.icon === "x" &&     <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>}
          {s.text}
        </div>
      );
    };

    const EntityCard = ({ entity, index, total }) => {
      const cls = `entity-${entity.status}`;
      const plain = ENTITY_PLAIN_NAMES[entity.id] || { title: entity.label, hint: entity.subtitle };
      return (
        <div
          className={`entity-card ${cls} border-2 rounded-2xl p-4 sm:p-5 pop-in flex flex-col`}
          style={{
            gridColumn: entity.col,
            gridRow: entity.row,
            animationDelay: `${index * 0.18}s`,
          }}
        >
          <StatusBadge status={entity.status} />
          <div className="mt-3">
            <div className="text-lg sm:text-xl font-bold text-white leading-tight break-words">{plain.title}</div>
            <div className="text-[10px] sm:text-xs text-zinc-500 font-mono mt-1 opacity-70 truncate">{entity.label}</div>
          </div>
          <div className="text-xs sm:text-sm text-zinc-300 leading-snug mt-2 italic">{plain.hint}</div>
          <details className="mt-3 pt-3 border-t border-zinc-800/60">
            <summary className="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300 select-none">columnas técnicas</summary>
            <div className="mt-2 space-y-1">
              {entity.columns.map((col, i) => (
                <div key={i} className="text-xs text-zinc-400 font-mono leading-relaxed break-all">
                  <span className="text-zinc-600">•</span> {col}
                </div>
              ))}
            </div>
          </details>
        </div>
      );
    };

    const PlainSummary = ({ summary }) => (
      <div className="fade-in-up bg-gradient-to-br from-zinc-900/60 to-zinc-900/20 border border-zinc-800 rounded-2xl p-6 md:p-8">
        <div className="flex items-start gap-4">
          <div className="hidden md:flex w-12 h-12 rounded-full bg-amber-500/10 border border-amber-500/30 items-center justify-center text-amber-300 flex-shrink-0">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div className="flex-1">
            <div className="text-xs font-bold text-amber-400 tracking-widest mb-2">PARA RESPONDER ESTO EN CRISTIANO</div>
            <p className="text-lg md:text-xl text-zinc-100 leading-relaxed">{summary}</p>
          </div>
        </div>
      </div>
    );

    const ConnectionsSVG = ({ entities, connections, visibleEntityIds }) => {
      const containerRef = useRef(null);
      const [paths, setPaths] = useState([]);

      useEffect(() => {
        const calc = () => {
          if (!containerRef.current) return;
          const container = containerRef.current.parentElement;
          if (!container) return;
          const containerRect = container.getBoundingClientRect();
          const newPaths = connections
            .filter(c => visibleEntityIds.has(c.from) && visibleEntityIds.has(c.to))
            .map((c, i) => {
              const fromEl = container.querySelector(`[data-entity-id="${c.from}"]`);
              const toEl   = container.querySelector(`[data-entity-id="${c.to}"]`);
              if (!fromEl || !toEl) return null;
              const fr = fromEl.getBoundingClientRect();
              const tr = toEl.getBoundingClientRect();
              const fromX = fr.left + fr.width / 2 - containerRect.left;
              const fromY = fr.top  + fr.height / 2 - containerRect.top;
              const toX   = tr.left + tr.width / 2 - containerRect.left;
              const toY   = tr.top  + tr.height / 2 - containerRect.top;
              const toEntity = entities.find(e => e.id === c.to);
              const fromEntity = entities.find(e => e.id === c.from);
              const isMissing = toEntity?.status === "missing" || fromEntity?.status === "missing";
              const isDesign  = !isMissing && (toEntity?.status === "design" || fromEntity?.status === "design");
              const stroke = isMissing ? "#ef4444" : isDesign ? "#f59e0b" : "#52525b";
              const midY = (fromY + toY) / 2;
              const d = `M ${fromX} ${fromY} C ${fromX} ${midY}, ${toX} ${midY}, ${toX} ${toY}`;
              return { d, stroke, key: `${c.from}-${c.to}-${i}`, dashed: isMissing };
            })
            .filter(Boolean);
          setPaths(newPaths);
        };
        const id = setTimeout(calc, 50);
        window.addEventListener("resize", calc);
        return () => { clearTimeout(id); window.removeEventListener("resize", calc); };
      }, [connections, visibleEntityIds, entities]);

      return (
        <svg ref={containerRef} className="absolute inset-0 pointer-events-none" style={{ width: "100%", height: "100%" }}>
          {paths.map(p => (
            <path
              key={p.key}
              d={p.d}
              stroke={p.stroke}
              strokeWidth="2.5"
              fill="none"
              strokeDasharray={p.dashed ? "8 6" : "1000"}
              className={p.dashed ? "" : "draw-line"}
              opacity="0.7"
            />
          ))}
        </svg>
      );
    };

    const useViewport = () => {
      const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1280);
      useEffect(() => {
        const onR = () => setW(window.innerWidth);
        window.addEventListener("resize", onR);
        return () => window.removeEventListener("resize", onR);
      }, []);
      return { width: w, isMobile: w < 640, isTablet: w >= 640 && w < 1024, isDesktop: w >= 1024 };
    };

    const Canvas = ({ question, stage }) => {
      const { isMobile, isTablet, isDesktop } = useViewport();
      const visibleEntities = useMemo(() => {
        if (stage < 2) return [];
        const greens  = question.entities.filter(e => e.status === "existing");
        const yellows = question.entities.filter(e => e.status === "design");
        const reds    = question.entities.filter(e => e.status === "missing");
        if (stage === 2) return greens;
        if (stage === 3) return [...greens, ...yellows];
        return [...greens, ...yellows, ...reds];
      }, [question, stage]);

      const visibleIds = useMemo(() => new Set(visibleEntities.map(e => e.id)), [visibleEntities]);

      const cols = Math.max(...question.entities.map(e => e.col));
      const rows = Math.max(...question.entities.map(e => e.row));

      // Responsive: mobile = 1 col apilada, tablet = max 2 cols auto-fit, desktop = layout posicional
      const gridStyle = isMobile
        ? { gridTemplateColumns: "1fr", gridAutoRows: "minmax(180px, auto)" }
        : isTablet
        ? { gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gridAutoRows: "minmax(180px, auto)" }
        : { gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${rows}, minmax(190px, auto))` };

      return (
        <div className="relative bg-grid rounded-2xl p-4 sm:p-6 md:p-8 border border-zinc-800" style={{ minHeight: isMobile ? "auto" : "520px" }}>
          <div className="relative grid gap-4 sm:gap-6" style={gridStyle}>
            {visibleEntities.map((e, i) => (
              <div
                key={e.id}
                data-entity-id={e.id}
                style={isDesktop ? { gridColumn: e.col, gridRow: e.row } : undefined}
              >
                <EntityCard entity={e} index={i} total={visibleEntities.length} />
              </div>
            ))}
            {isDesktop && (
              <ConnectionsSVG entities={question.entities} connections={question.connections} visibleEntityIds={visibleIds} />
            )}
          </div>
          {!isDesktop && visibleEntities.length > 1 && (
            <div className="mt-4 text-xs text-zinc-600 text-center italic">Conexiones visibles en pantalla amplia</div>
          )}
        </div>
      );
    };

    const HighlightedQuestion = ({ text, keywords }) => {
      const pattern = new RegExp(`(${keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join("|")})`, "gi");
      const parts = text.split(pattern);
      return (
        <p className="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold leading-snug sm:leading-tight text-white">
          {parts.map((part, i) => {
            const isKeyword = keywords.some(k => k.toLowerCase() === part.toLowerCase());
            return isKeyword
              ? <span key={i} className="keyword-highlight text-amber-200">{part}</span>
              : <span key={i}>{part}</span>;
          })}
        </p>
      );
    };

    const PANEL_COLORS = {
      emerald: { border: "border-emerald-500/40", bg: "bg-emerald-500/5",  icon: "bg-emerald-500/20 text-emerald-400" },
      amber:   { border: "border-amber-500/40",   bg: "bg-amber-500/5",    icon: "bg-amber-500/20 text-amber-400"     },
      red:     { border: "border-red-500/40",     bg: "bg-red-500/5",      icon: "bg-red-500/20 text-red-400"         },
    };

    const Panel = ({ icon, title, color, children, onClose }) => {
      const c = PANEL_COLORS[color] || PANEL_COLORS.emerald;
      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4 fade-in-up" onClick={onClose}>
          <div className={`bg-zinc-950 border-2 ${c.border} rounded-3xl w-full max-w-4xl max-h-[85vh] overflow-hidden flex flex-col`} onClick={e => e.stopPropagation()}>
            <div className={`px-6 py-4 border-b border-zinc-800 flex items-center justify-between ${c.bg}`}>
              <div className="flex items-center gap-3">
                <div className={`w-10 h-10 rounded-full ${c.icon} flex items-center justify-center`}>{icon}</div>
                <h3 className="text-2xl font-bold text-white">{title}</h3>
              </div>
              <button onClick={onClose} className="text-zinc-500 hover:text-white text-3xl leading-none">×</button>
            </div>
            <div className="flex-1 overflow-y-auto p-6 scrollbar-custom">{children}</div>
          </div>
        </div>
      );
    };

    // ============================================================
    // MiniChart — SVG hand-coded para 6 tipos de visualización
    // ============================================================
    const LineSvg = ({ data }) => {
      const W = 600, H = 240, P = 36;
      const xs = data.map((_, i) => P + (i * (W - 2 * P) / Math.max(data.length - 1, 1)));
      const ys_raw = data.map(d => d.y);
      const maxY = Math.max(...ys_raw, 1);
      const minY = Math.min(...ys_raw, 0);
      const range = maxY - minY || 1;
      const ys = ys_raw.map(y => H - P - ((y - minY) / range) * (H - 2 * P));
      const pathD = xs.map((x, i) => `${i === 0 ? "M" : "L"} ${x} ${ys[i]}`).join(" ");
      const areaD = `${pathD} L ${xs[xs.length-1]} ${H-P} L ${xs[0]} ${H-P} Z`;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
          <defs>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#22d3ee" stopOpacity="0.4"/>
              <stop offset="100%" stopColor="#22d3ee" stopOpacity="0"/>
            </linearGradient>
          </defs>
          {[0, 0.25, 0.5, 0.75, 1].map((t, i) => (
            <line key={i} x1={P} x2={W-P} y1={P + t*(H-2*P)} y2={P + t*(H-2*P)} stroke="#27272a" strokeWidth="1"/>
          ))}
          <path d={areaD} fill="url(#lineGrad)"/>
          <path d={pathD} stroke="#22d3ee" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          {xs.map((x, i) => (
            <g key={i}>
              <circle cx={x} cy={ys[i]} r="5" fill="#22d3ee" stroke="#0a0a0a" strokeWidth="2"/>
              <text x={x} y={H-12} fill="#71717a" fontSize="11" textAnchor="middle">{data[i].x}</text>
            </g>
          ))}
          <text x={P-8} y={P+4} fill="#71717a" fontSize="10" textAnchor="end">{maxY.toFixed(0)}</text>
          <text x={P-8} y={H-P+4} fill="#71717a" fontSize="10" textAnchor="end">{minY.toFixed(0)}</text>
        </svg>
      );
    };

    const BarSvg = ({ data, horizontal = false }) => {
      const W = 600, H = 280, P = 40;
      const maxV = Math.max(...data.map(d => d.value), 1);
      if (horizontal) {
        const rowH = (H - 2 * P) / data.length;
        const barH = Math.min(rowH * 0.7, 36);
        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
            {data.map((d, i) => {
              const w = ((W - 2 * P - 120) * d.value / maxV);
              const y = P + i * rowH + (rowH - barH) / 2;
              return (
                <g key={i}>
                  <text x={P} y={y + barH/2 + 4} fill="#e4e4e7" fontSize="12" textAnchor="start">{d.label}</text>
                  <rect x={P + 120} y={y} width={w} height={barH} rx="4" fill="#22d3ee" opacity="0.85"/>
                  <text x={P + 124 + w} y={y + barH/2 + 4} fill="#22d3ee" fontSize="12" fontWeight="bold" textAnchor="start">{d.value}</text>
                </g>
              );
            })}
          </svg>
        );
      }
      const barW = Math.min((W - 2 * P) / data.length * 0.65, 80);
      const gap = (W - 2 * P - barW * data.length) / Math.max(data.length - 1, 1);
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
          {data.map((d, i) => {
            const x = P + i * (barW + gap);
            const h = ((H - 2 * P - 30) * d.value / maxV);
            const y = H - P - h;
            return (
              <g key={i}>
                <rect x={x} y={y} width={barW} height={h} rx="4" fill="#22d3ee" opacity="0.85"/>
                <text x={x + barW/2} y={y - 6} fill="#22d3ee" fontSize="12" fontWeight="bold" textAnchor="middle">{d.value}</text>
                <text x={x + barW/2} y={H - P + 18} fill="#a1a1aa" fontSize="11" textAnchor="middle">{d.label}</text>
              </g>
            );
          })}
        </svg>
      );
    };

    const FunnelSvg = ({ data }) => {
      const W = 600, H = 280, P = 30;
      const maxV = data[0]?.value || 1;
      const rowH = (H - 2 * P) / data.length;
      const barH = rowH * 0.78;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
          {data.map((d, i) => {
            const w = ((W - 2 * P - 160) * d.value / maxV);
            const x = (W - w) / 2;
            const y = P + i * rowH + (rowH - barH) / 2;
            const prev = i > 0 ? data[i-1].value : null;
            const pctOfPrev = prev ? Math.round((d.value / prev) * 100) : 100;
            const colors = ["#22d3ee", "#06b6d4", "#0891b2", "#0e7490", "#155e75", "#164e63"];
            return (
              <g key={i}>
                <rect x={x} y={y} width={w} height={barH} rx="6" fill={colors[i] || "#164e63"}/>
                <text x={x + w/2} y={y + barH/2 + 5} fill="#fafafa" fontSize="14" fontWeight="bold" textAnchor="middle">{d.stage}</text>
                <text x={W - P} y={y + barH/2 + 5} fill="#71717a" fontSize="13" fontWeight="bold" textAnchor="end">{d.value}</text>
                {i > 0 && <text x={W - P} y={y + barH/2 + 22} fill="#52525b" fontSize="10" textAnchor="end">{pctOfPrev}% del anterior</text>}
              </g>
            );
          })}
        </svg>
      );
    };

    const KpiCard = ({ data }) => {
      const trendColor = data.trendDirection === "up" ? "#10b981" : data.trendDirection === "down" ? "#ef4444" : "#a1a1aa";
      const arrow = data.trendDirection === "up" ? "↑" : data.trendDirection === "down" ? "↓" : "→";
      const spark = data.sparkline || [];
      return (
        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-6 sm:gap-8 py-4">
          <div className="flex-shrink-0">
            <div className="text-6xl sm:text-7xl font-black text-white leading-none tracking-tight">{data.value}</div>
            <div className="text-sm text-zinc-400 mt-2 uppercase tracking-wider font-semibold">{data.label}</div>
            {data.trend && (
              <div className="mt-3 flex items-center gap-2">
                <span className="text-2xl font-bold" style={{color: trendColor}}>{arrow}</span>
                <span className="text-lg font-bold" style={{color: trendColor}}>{data.trend}</span>
              </div>
            )}
          </div>
          {spark.length > 1 && (
            <div className="flex-1 w-full sm:w-auto">
              <svg viewBox="0 0 300 80" className="w-full h-auto" preserveAspectRatio="none">
                {(() => {
                  const W = 300, H = 80, P = 4;
                  const maxV = Math.max(...spark, 1);
                  const minV = Math.min(...spark, 0);
                  const range = maxV - minV || 1;
                  const xs = spark.map((_, i) => P + (i * (W - 2*P) / Math.max(spark.length - 1, 1)));
                  const ys = spark.map(v => H - P - ((v - minV) / range) * (H - 2*P));
                  const d = xs.map((x, i) => `${i === 0 ? "M" : "L"} ${x} ${ys[i]}`).join(" ");
                  return (

    const HeatmapSvg = ({ data }) => {
      const { rows = [], cols = [], values = [] } = data;
      const cellW = 60, cellH = 40, rowLabelW = 110, colLabelH = 30;
      const W = rowLabelW + cellW * cols.length + 16;
      const H = colLabelH + cellH * rows.length + 16;
      const colorFor = (v) => {
        const t = Math.min(Math.max(v / 100, 0), 1);
        const r = Math.round(15 + (34 - 15) * t);
        const g = Math.round(118 + (211 - 118) * t);
        const b = Math.round(110 + (238 - 110) * t);
        return `rgb(${r},${g},${b})`;
      };
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
          {cols.map((c, i) => (
            <text key={i} x={rowLabelW + i * cellW + cellW/2} y={colLabelH - 8} fill="#a1a1aa" fontSize="11" textAnchor="middle">{c}</text>
          ))}
          {rows.map((r, ri) => (
            <g key={ri}>
              <text x={rowLabelW - 8} y={colLabelH + ri * cellH + cellH/2 + 4} fill="#e4e4e7" fontSize="12" textAnchor="end">{r}</text>
              {cols.map((_, ci) => {
                const v = values[ri]?.[ci] ?? 0;
                return (
                  <g key={ci}>
                    <rect x={rowLabelW + ci * cellW + 2} y={colLabelH + ri * cellH + 2} width={cellW - 4} height={cellH - 4} rx="3" fill={colorFor(v)} opacity={0.3 + v/100 * 0.7}/>
                    <text x={rowLabelW + ci * cellW + cellW/2} y={colLabelH + ri * cellH + cellH/2 + 4} fill="#fafafa" fontSize="11" fontWeight="bold" textAnchor="middle">{v}</text>
                  </g>
                );
              })}
            </g>
          ))}
        </svg>
      );

    // ============================================================
    // QuestionRevealScreen — pantalla con pregunta seleccionada
    // Pregunta + PlainSummary + Canvas animado + grid de 5 botones
    // ============================================================
    const QuestionRevealScreen = ({
      question, stage,
      isAnalyzingArch, isAnalyzingViz,

      onOpenPanel, onOpenArchitecture, onOpenVisualization,

                {stage === 3 && "PASO 2 — DECISIONES DE DISEÑO"}
                {stage >= 4 && "PASO 3 — MAPA COMPLETO"}

              <div className="h-px bg-zinc-800 flex-1"></div>
            </div>
            <Canvas question={question} stage={stage} />
