        {stage >= 4 && (
          <div className="fade-in-up space-y-4 pt-4">
            <button onClick={() => onOpenPanel("translation")} className="w-full bg-gradient-to-r from-amber-500/20 to-amber-500/5 hover:from-amber-500/30 hover:to-amber-500/10 border-2 border-amber-500/50 rounded-2xl p-6 text-left transition-all group flex items-center gap-5">
              <div className="w-14 h-14 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-300 flex-shrink-0">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </div>
              <div className="flex-1">
                <div className="text-2xl md:text-3xl font-black text-white group-hover:text-amber-200 leading-tight">EN CRISTIANO</div>
                <div className="text-base text-zinc-300 mt-1">Qué significa todo esto, con un ejemplo concreto que cualquiera entiende</div>
              </div>
              <div className="text-amber-400 text-3xl flex-shrink-0">→</div>
            </button>
            <div className="grid sm:grid-cols-2 gap-4">
              <button onClick={onOpenArchitecture} className="bg-gradient-to-br from-violet-500/15 to-violet-500/5 hover:from-violet-500/25 hover:to-violet-500/10 border border-violet-500/40 hover:border-violet-500/70 rounded-xl p-5 text-left transition-all group">
                <div className="flex items-center gap-3 mb-2 flex-wrap">
                  <div className="text-violet-300 flex-shrink-0">
                    {isAnalyzingArch
                      ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="animate-spin"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M22 12a10 10 0 0 1-10 10"/></svg>
                      : <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>}
                  </div>
                  <div className="text-lg font-bold text-white group-hover:text-violet-200 leading-tight">¿Guardar o calcular?</div>
                  <div className="ml-auto text-[10px] font-bold tracking-widest text-violet-300/80 px-2 py-0.5 bg-violet-500/20 rounded-full">+ML</div>
                </div>
                <div className="text-sm text-zinc-400">{isAnalyzingArch ? "Claude analizando..." : "Arquitectura recomendada con lente ML-ready"}</div>
              </button>
              <button onClick={onOpenVisualization} className="bg-gradient-to-br from-cyan-500/15 to-cyan-500/5 hover:from-cyan-500/25 hover:to-cyan-500/10 border border-cyan-500/40 hover:border-cyan-500/70 rounded-xl p-5 text-left transition-all group">
                <div className="flex items-center gap-3 mb-2 flex-wrap">
                  <div className="text-cyan-300 flex-shrink-0">
                    {isAnalyzingViz
                      ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="animate-spin"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M22 12a10 10 0 0 1-10 10"/></svg>
                      : <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>}
                  </div>
                  <div className="text-lg font-bold text-white group-hover:text-cyan-200 leading-tight">Dashboard imaginado</div>
                </div>
                <div className="text-sm text-zinc-400">{isAnalyzingViz ? "Claude diseñando charts..." : "Qué gráficos tendrías si modelas bien"}</div>
              </button>
            </div>
            <div className="grid sm:grid-cols-2 gap-4">
              <button
                onClick={() => onOpenPanel("gaps")}
                disabled={!hasYellows && !hasReds}
                className={`border rounded-xl p-5 text-left transition-all group ${(!hasYellows && !hasReds) ? "bg-zinc-900/30 border-zinc-900 opacity-40 cursor-not-allowed" : "bg-zinc-900 hover:bg-zinc-800 border-zinc-700"}`}
              >
                <div className="flex items-center gap-3 mb-2">
                  <div className="text-red-400">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                  </div>
                  <div className="text-lg font-bold text-white group-hover:text-red-300">¿Qué falta?</div>
                </div>
                <div className="text-sm text-zinc-500">{(!hasYellows && !hasReds) ? "Esta pregunta no tiene gaps" : "Roadmap de datos para responderla 100%"}</div>
              </button>
              <button onClick={() => onOpenPanel("sql")} className="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-xl p-5 text-left transition-all group">
                <div className="flex items-center gap-3 mb-2">
                  <div className="text-emerald-400">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                  </div>
                  <div className="text-lg font-bold text-white group-hover:text-emerald-300">SQL (solo técnicos)</div>
                </div>
                <div className="text-sm text-zinc-500">Query ejecutable contra zona_ai</div>
              </button>
            </div>
          </div>
        )}
      </div>
    );

    // ============================================================
    // PanelManager — todos los modales lazy según openPanel
    // ============================================================
    const ARCH_REC_MAP = {
      runtime:     { label: "CALCULAR RUNTIME",  bg: "bg-sky-500/15",     border: "border-sky-500/40",     text: "text-sky-300",     subtitle: "Sin persistir — backend lo calcula al vuelo" },
      materialize: { label: "MATERIALIZAR",      bg: "bg-emerald-500/15", border: "border-emerald-500/40", text: "text-emerald-300", subtitle: "Columna o tabla con valor actual persistido" },
      snapshot:    { label: "SNAPSHOT HISTÓRICO",bg: "bg-amber-500/15",   border: "border-amber-500/40",   text: "text-amber-300",   subtitle: "Append-only con timestamps para historia y ML" },
      new_rule:    { label: "REGLA / TRIGGER",   bg: "bg-violet-500/15",  border: "border-violet-500/40",  text: "text-violet-300",  subtitle: "Lógica de negocio en backend (cron/trigger)" },
    };
    const ARCH_ML_MAP = {
      critical: { label: "ML: CRÍTICO", color: "bg-red-500/20 text-red-300 border-red-500/40" },
      useful:   { label: "ML: ÚTIL",     color: "bg-amber-500/20 text-amber-300 border-amber-500/40" },
      low:      { label: "ML: BAJO",     color: "bg-zinc-700/50 text-zinc-400 border-zinc-700" },
    };

    const PanelManager = ({ openPanel, onClose, question, currentArchitecture, currentVisualization, archError, vizError }) => {
      if (!openPanel || !question) return null;

      if (openPanel === "sql") {
        return (
          <Panel icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>} title="SQL ejecutable" color="emerald" onClose={onClose}>
            <div className="text-sm text-zinc-400 mb-4">Query contra <code className="text-emerald-400">zona_ai</code>, filtrado a <code className="text-emerald-400">tenants.slug = 'mia'</code>:</div>
            <pre className="bg-zinc-900 border border-zinc-800 rounded-xl p-5 text-sm text-emerald-200 overflow-x-auto scrollbar-custom leading-relaxed">{question.sql}</pre>
          </Panel>
        );
      }

      if (openPanel === "translation") {
        return (
          <Panel icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>} title="En cristiano" color="amber" onClose={onClose}>
            {question.concreteExample && (
              <div className="mb-6 p-6 bg-gradient-to-br from-emerald-500/15 to-emerald-500/5 border-2 border-emerald-500/40 rounded-2xl">
                <div className="text-xs font-bold text-emerald-400 tracking-widest mb-3 flex items-center gap-2">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
                  EJEMPLO CONCRETO
                </div>
                <p className="text-xl text-white leading-relaxed font-medium">{question.concreteExample}</p>
              </div>
            )}
            <div className="mb-6">
              <div className="text-xs font-bold text-zinc-400 tracking-widest mb-3">QUÉ SIGNIFICA TODO ESTO</div>
              <p className="text-lg text-zinc-100 leading-relaxed">{question.translation}</p>
            </div>
            {question.designDecision && (
              <div className="p-5 bg-amber-500/10 border border-amber-500/30 rounded-2xl">
                <div className="text-xs font-bold text-amber-400 tracking-widest mb-2">PRÓXIMO PASO DE PRODUCTO</div>
                <p className="text-white leading-relaxed">{question.designDecision}</p>
              </div>
            )}
          </Panel>
        );
      }

      if (openPanel === "visualization") {
        return (
          <Panel
            icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>}
            title="Dashboard imaginado"
            color="emerald"
            onClose={onClose}
          >
            {vizError && (
              <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-300 mb-4">
                <strong>Error:</strong> {vizError}
              </div>
            )}
            {currentVisualization && (
              <div className="space-y-5">
                <div className="p-5 bg-gradient-to-br from-cyan-500/15 to-cyan-500/5 border-2 border-cyan-500/40 rounded-2xl">
                  <div className="text-xs font-bold text-cyan-300 tracking-widest mb-3">SI LA BD ESTÁ BIEN MODELADA, TENDRÍAS ESTE DASHBOARD</div>
                  <p className="text-lg text-white leading-relaxed font-medium">{currentVisualization.summary}</p>
                </div>
                {currentVisualization.charts && currentVisualization.charts.length > 0 ? (
                  <div className="space-y-5">
                    {currentVisualization.charts.map((chart, i) => (
                      <div key={i} className="p-5 sm:p-6 bg-zinc-900/60 border border-zinc-800 rounded-2xl">
                        <div className="flex items-start justify-between mb-4 flex-wrap gap-2">
                          <div>
                            <div className="text-xl font-bold text-white leading-tight">{chart.title}</div>
                            {chart.subtitle && <div className="text-sm text-zinc-500 mt-1">{chart.subtitle}</div>}
                          </div>
                          <div className="text-[10px] font-bold tracking-widest text-cyan-300/70 bg-cyan-500/10 border border-cyan-500/20 px-2.5 py-1 rounded-full uppercase">
                            {chart.chartType.replace("_", " ")}
                          </div>
                        </div>
                        <div className="bg-zinc-950/60 rounded-xl p-3 sm:p-4 border border-zinc-800/60">
                          <MiniChart chart={chart} />
                        </div>
                        {chart.insight && (
                          <div className="mt-4 p-3 bg-cyan-500/10 border-l-4 border-cyan-500/60 rounded-r-lg">
                            <div className="text-[10px] font-bold text-cyan-300 tracking-widest mb-1">INSIGHT ACCIONABLE</div>
                            <p className="text-sm text-zinc-100 leading-relaxed">{chart.insight}</p>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                ) : !vizError && (
                  <div className="p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-zinc-400">
                    No se generaron gráficos para esta pregunta.
                  </div>
                )}
                <div className="p-4 bg-amber-500/5 border border-amber-500/20 rounded-xl text-xs text-zinc-400">
                  <strong className="text-amber-300">Nota:</strong> los datos son MOCK realistas generados por Claude. El dashboard real requiere que la BD del cliente persista las features según la decisión arquitectónica del botón "¿Guardar o calcular?".
                </div>
              </div>
            )}
          </Panel>
        );
      }

      if (openPanel === "architecture") {
        return (
          <Panel
            icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>}
            title="¿Guardar o calcular? + lente ML"
            color="emerald"
            onClose={onClose}
          >
            {archError && (
              <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-300 mb-4">
                <strong>Error:</strong> {archError}
              </div>
            )}
            {currentArchitecture && (
              <div className="space-y-5">
                <div className="p-5 bg-gradient-to-br from-violet-500/15 to-violet-500/5 border-2 border-violet-500/40 rounded-2xl">
                  <div className="text-xs font-bold text-violet-300 tracking-widest mb-3">DECISIÓN ARQUITECTÓNICA CLAVE</div>
                  <p className="text-lg text-white leading-relaxed font-medium">{currentArchitecture.summary}</p>
                </div>
                {currentArchitecture.items && currentArchitecture.items.length > 0 ? (
                  <div className="space-y-4">
                    {currentArchitecture.items.map((item, i) => {
                      const rec = ARCH_REC_MAP[item.recommendation] || ARCH_REC_MAP.materialize;
                      const mlBadge = ARCH_ML_MAP[item.mlRelevance] || ARCH_ML_MAP.low;
                      return (
                        <div key={i} className={`p-5 ${rec.bg} border ${rec.border} rounded-2xl`}>
                          <div className="flex items-center gap-3 mb-3 flex-wrap">
                            <code className={`${rec.text} font-bold text-base`}>{item.entityId}</code>
                            <div className={`px-3 py-1 rounded-full text-xs font-bold tracking-widest ${rec.text} ${rec.bg} border ${rec.border}`}>
                              → {rec.label}
                            </div>
                            <div className={`px-2.5 py-1 rounded-full text-[10px] font-bold tracking-widest border ${mlBadge.color}`}>
                              {mlBadge.label}
                            </div>
                          </div>
                          <div className={`text-xs ${rec.text} opacity-70 mb-2 italic`}>{rec.subtitle}</div>
                          <p className="text-white leading-relaxed mb-3">{item.reasoning}</p>
                          {item.mlContext && item.mlRelevance !== "low" && (
                            <div className="mt-3 p-3 bg-zinc-950/40 border border-zinc-800 rounded-xl">
                              <div className="text-[10px] font-bold text-zinc-500 tracking-widest mb-1">QUÉ MODELO SE BENEFICIA</div>
                              <p className="text-sm text-zinc-200 leading-relaxed">{item.mlContext}</p>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="p-5 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl">
                    <div className="text-xs font-bold text-emerald-400 tracking-widest mb-2">SIN DECISIONES PENDIENTES</div>
                    <p className="text-white leading-relaxed">Esta pregunta no tiene gaps arquitectónicos. Las tablas involucradas ya están materializadas correctamente. El próximo paso natural está en el resumen de arriba.</p>
                  </div>
                )}
              </div>
            )}
          </Panel>
        );
      }

      if (openPanel === "gaps") {
        return (
          <Panel icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>} title="¿Qué falta? — Roadmap" color="red" onClose={onClose}>
            <div className="space-y-4">
              {question.entities.filter(e => e.status === "design").map(e => (
                <div key={e.id} className="p-5 bg-amber-500/10 border border-amber-500/30 rounded-2xl">
                  <div className="flex items-center gap-3 mb-2">
                    <StatusBadge status="design" />
                    <code className="text-amber-300 font-bold">{e.label}</code>
                  </div>
                  <div className="text-white text-lg font-semibold mb-1">{e.subtitle}</div>
                  <div className="text-zinc-400 text-sm">Existe la tabla, pero el dato vive en un formato que no permite analítica directa. Es decisión de producto, no falla.</div>
                </div>
              ))}
              {question.entities.filter(e => e.status === "missing").map(e => (
                <div key={e.id} className="p-5 bg-red-500/10 border border-red-500/30 border-dashed rounded-2xl">
                  <div className="flex items-center gap-3 mb-2">
                    <StatusBadge status="missing" />
                    <code className="text-red-300 font-bold">{e.label}</code>
                  </div>
                  <div className="text-white text-lg font-semibold mb-2">{e.subtitle}</div>
                  <div className="text-zinc-300 text-sm mb-3">Estructura propuesta:</div>
                  <ul className="space-y-1">
                    {e.columns.map((c, i) => <li key={i} className="text-xs text-zinc-300 font-mono">• {c}</li>)}
                  </ul>
                </div>
              ))}
              {question.designDecision && (
                <div className="p-5 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl">
                  <div className="text-xs font-bold text-emerald-400 tracking-widest mb-2">DECISIÓN A TOMAR CON EL CLIENTE</div>
                  <p className="text-white leading-relaxed">{question.designDecision}</p>
                </div>
              )}
            </div>
          </Panel>
        );
      }

      return null;
    };

    const App = () => {
      const [selectedId, setSelectedId] = useState(null);
      const [stage, setStage] = useState(0); // 0=picker, 1=question shown, 2=greens, 3=+yellows, 4=+reds
      const [openPanel, setOpenPanel] = useState(null); // 'sql' | 'translation' | 'gaps'
      const [liveQuestion, setLiveQuestion] = useState(null);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analyzeError, setAnalyzeError] = useState(null);
      const [apiKey, setApiKey] = useState(() => {
        try {
          const fromStorage = localStorage.getItem("claude_api_key");
          if (fromStorage) return fromStorage;
          if (typeof window !== "undefined" && window.LOCAL_API_KEY) {
            localStorage.setItem("claude_api_key", window.LOCAL_API_KEY);
            return window.LOCAL_API_KEY;
          }
          return "";
        } catch {
          return (typeof window !== "undefined" && window.LOCAL_API_KEY) || "";
        }
      });
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [activeSchema, setActiveSchema] = useState(() => {
        try {
          const raw = localStorage.getItem("claude_active_schema");
          return raw ? JSON.parse(raw) : null;
        } catch { return null; }
      });
      const [showSchemaModal, setShowSchemaModal] = useState(false);
      const [isProcessingSchema, setIsProcessingSchema] = useState(false);
      const [schemaError, setSchemaError] = useState(null);
      const [liveArchitecture, setLiveArchitecture] = useState(null);
      const [isAnalyzingArch, setIsAnalyzingArch] = useState(false);
      const [archError, setArchError] = useState(null);
      const [liveVisualization, setLiveVisualization] = useState(null);
      const [isAnalyzingViz, setIsAnalyzingViz] = useState(false);
      const [vizError, setVizError] = useState(null);

      const revealTimers = useRef([]);
      const clearRevealTimers = () => {
        revealTimers.current.forEach(clearTimeout);
        revealTimers.current = [];
      };
      // Limpiar timers pendientes si el componente se desmonta a mitad de la animación
      useEffect(() => clearRevealTimers, []);

      const question = selectedId && selectedId.startsWith("live-")
        ? liveQuestion
        : QUESTIONS.find(q => q.id === selectedId);

      const reset = () => {
        clearRevealTimers();
        setSelectedId(null); setStage(0); setOpenPanel(null);
      };

      const startReveal = (id) => {
        // Cancelar cualquier reveal en curso para evitar timeouts viejos
        // disparando setStage sobre una pregunta nueva (race condition).
        clearRevealTimers();
        setSelectedId(id);
        setStage(1);
        setOpenPanel(null);
        revealTimers.current = [
          setTimeout(() => setStage(2), REVEAL_TIMING_MS.greens),
          setTimeout(() => setStage(3), REVEAL_TIMING_MS.yellows),
          setTimeout(() => setStage(4), REVEAL_TIMING_MS.all),
        ];
      };

      const pickQuestion = (id) => startReveal(id);

      const handleAnalyze = async (text) => {
        setIsAnalyzing(true);
        setAnalyzeError(null);
        try {
          const customKnowledge = activeSchema?.knowledgePrompt || null;
          const parsed = await analyzeWithClaude(text, apiKey, customKnowledge);
          setLiveQuestion(parsed);
          startReveal(parsed.id);
        } catch (err) {
          setAnalyzeError(err.message || String(err));
        } finally {
          setIsAnalyzing(false);
        }
      };

      const saveKey = (k) => {
        setApiKey(k);
        try { localStorage.setItem("claude_api_key", k); } catch {}
        setShowKeyModal(false);
      };

      const handleProcessSchema = async (input) => {
        if (!apiKey) { setShowSchemaModal(false); setShowKeyModal(true); return; }
        setIsProcessingSchema(true);
        setSchemaError(null);
        try {
          const parsed = await processSchema(input, apiKey);
          setActiveSchema(parsed);
          try { localStorage.setItem("claude_active_schema", JSON.stringify(parsed)); } catch {}
          setShowSchemaModal(false);
          reset();
        } catch (err) {
          setSchemaError(err.message || String(err));
        } finally {
          setIsProcessingSchema(false);
        }
      };

      const clearActiveSchema = () => {
        setActiveSchema(null);
        try { localStorage.removeItem("claude_active_schema"); } catch {}
        reset();
      };

      const handleOpenArchitecture = async () => {
        if (!question) return;
        // Si ya tiene architectureAnalysis pre-cargado (pre-cargadas), solo abre panel
        if (question.architectureAnalysis) {
          setOpenPanel("architecture");
          return;
        }
        // Si ya hicimos la llamada antes para esta live question, reusar
        if (liveArchitecture && liveArchitecture.forQuestionId === question.id) {
          setOpenPanel("architecture");
          return;
        }
        // Live question sin análisis previo — llamar a Claude
        if (!apiKey) { setShowKeyModal(true); return; }
        setIsAnalyzingArch(true);
        setArchError(null);
        try {
          const customKnowledge = activeSchema?.knowledgePrompt || null;
          const result = await analyzeArchitecture(question, apiKey, customKnowledge);
          result.forQuestionId = question.id;
          setLiveArchitecture(result);
          setOpenPanel("architecture");
        } catch (err) {
          setArchError(err.message || String(err));
          setOpenPanel("architecture");
        } finally {
          setIsAnalyzingArch(false);
        }
      };

      const currentArchitecture = question?.architectureAnalysis
        || (liveArchitecture?.forQuestionId === question?.id ? liveArchitecture : null);

      const handleOpenVisualization = async () => {
        if (!question) return;
        if (liveVisualization && liveVisualization.forQuestionId === question.id) {
          setOpenPanel("visualization");
          return;
        }
        if (!apiKey) { setShowKeyModal(true); return; }
        setIsAnalyzingViz(true);
        setVizError(null);
        try {
          const customKnowledge = activeSchema?.knowledgePrompt || null;
          const result = await analyzeVisualization(question, apiKey, customKnowledge);
          result.forQuestionId = question.id;
          setLiveVisualization(result);
          setOpenPanel("visualization");
        } catch (err) {
          setVizError(err.message || String(err));
          setOpenPanel("visualization");
        } finally {
          setIsAnalyzingViz(false);
        }
      };

      const currentVisualization = liveVisualization?.forQuestionId === question?.id ? liveVisualization : null;

      const hasYellows = question?.entities.some(e => e.status === "design");
      const hasReds    = question?.entities.some(e => e.status === "missing");

      return (
        <div className="min-h-screen bg-gradient-to-br from-zinc-950 via-zinc-950 to-black">
          <header className="border-b border-zinc-900 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-3 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-2 sm:gap-3">
              <div onClick={reset} className="cursor-pointer flex items-center gap-2 sm:gap-3 group min-w-0">
                <div className="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-amber-500 flex items-center justify-center font-black text-zinc-950 text-lg sm:text-xl group-hover:scale-105 transition-transform flex-shrink-0">M</div>
                <div className="min-w-0">
                  <div className="text-base sm:text-lg font-bold text-white leading-tight truncate">Taller MIA</div>
                  <div className="hidden sm:block text-xs text-zinc-500 truncate">La pregunta define el diseño de la BD</div>
                </div>
              </div>
              <div className="flex items-center gap-1.5 sm:gap-2 flex-shrink-0">
                <button
                  onClick={() => setShowSchemaModal(true)}
                  className="text-xs text-emerald-300 hover:text-emerald-200 border border-emerald-500/30 hover:border-emerald-500/60 rounded-full px-2.5 sm:px-3 py-1.5 transition-colors flex items-center gap-1.5"
                  title="Cargar el esquema de tu BD (DDL, texto o imagen)"
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/></svg>
                  <span className="hidden sm:inline">Mi BD</span>
                </button>
                <button
                  onClick={() => setShowKeyModal(true)}
                  className="text-xs text-zinc-400 hover:text-white border border-zinc-800 hover:border-zinc-600 rounded-full px-2.5 sm:px-3 py-1.5 transition-colors flex items-center gap-1.5"
                  title="Configurar API key de Claude"
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  <span className="hidden sm:inline">{apiKey ? "API key ✓" : "API key"}</span>
                  <span className="sm:hidden">{apiKey ? "✓" : "key"}</span>
                </button>
                {question && (
                  <button onClick={reset} className="text-xs sm:text-sm text-zinc-400 hover:text-white border border-zinc-800 hover:border-zinc-600 rounded-full px-3 sm:px-4 py-1.5 sm:py-2 transition-colors">
                    <span className="hidden sm:inline">← Otra pregunta</span>
                    <span className="sm:hidden">←</span>
                  </button>
                )}
              </div>
            </div>
          </header>
          {activeSchema && (
            <SchemaBanner
              schema={activeSchema}
              onChange={() => setShowSchemaModal(true)}
              onClear={clearActiveSchema}
            />
          )}

          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
            {!question && (
              <LandingScreen
                activeSchema={activeSchema}
                apiKey={apiKey}
                isAnalyzing={isAnalyzing}
                analyzeError={analyzeError}
                onAnalyze={handleAnalyze}
                onRequestKey={() => setShowKeyModal(true)}
                onPickQuestion={pickQuestion}
              />
            )}

            {question && (
              <QuestionRevealScreen
                question={question}
                stage={stage}
                isAnalyzingArch={isAnalyzingArch}
                isAnalyzingViz={isAnalyzingViz}
                hasYellows={hasYellows}
                hasReds={hasReds}
                onOpenPanel={setOpenPanel}
                onOpenArchitecture={handleOpenArchitecture}
                onOpenVisualization={handleOpenVisualization}
              />
            )}
          </main>

          <PanelManager
            openPanel={openPanel}
            onClose={() => setOpenPanel(null)}
            question={question}
            currentArchitecture={currentArchitecture}
            currentVisualization={currentVisualization}
            archError={archError}
            vizError={vizError}
          />
          {showKeyModal && (
            <ApiKeyModal
              initialKey={apiKey}
              onSave={saveKey}
              onClose={() => setShowKeyModal(false)}
            />
          )}

          {showSchemaModal && (
            <SchemaContextModal
              onSubmit={handleProcessSchema}
              onClose={() => { setShowSchemaModal(false); setSchemaError(null); }}
              isProcessing={isProcessingSchema}
              error={schemaError}
            />
          )}

          <footer className="border-t border-zinc-900 mt-16 py-6">
            <div className="max-w-7xl mx-auto px-6 text-center text-xs text-zinc-600 space-y-1.5">
              <div>
                La Pregunta Define la BD · workshop tool · open source MIT
              </div>
              <div className="flex items-center justify-center gap-3 flex-wrap text-zinc-700">
                <span>Construido con Claude · React · Tailwind</span>
                <span>·</span>
                <a href="https://crearia.co" target="_blank" rel="noopener" className="hover:text-emerald-400 transition-colors">CrearIA</a>
                <span>·</span>
                <a href="https://github.com/ocuellar09/question-first-db" target="_blank" rel="noopener" className="hover:text-emerald-400 transition-colors">GitHub</a>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
