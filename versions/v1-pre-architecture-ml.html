<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taller MIA — La pregunta define el diseño de la BD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="local-config.js" onerror="console.log('No local-config.js found — pega tu API key manualmente via el botón del header.')"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    code, pre { font-family: 'JetBrains Mono', monospace; }
    body { background: #050505; color: #fafafa; overflow-x: hidden; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.6); }
      70%  { opacity: 1; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.6; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.25); }
      50%      { box-shadow: 0 0 40px rgba(16, 185, 129, 0.5); }
    }

    .fade-in-up   { animation: fadeInUp 0.6s ease-out forwards; }
    .pop-in       { animation: popIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .draw-line    { stroke-dasharray: 1000; animation: drawLine 1.2s ease-out forwards; }
    .pulse-soft   { animation: pulse 2s ease-in-out infinite; }
    .glow-green   { animation: glow 3s ease-in-out infinite; }

    .keyword-highlight {
      background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.25), transparent);
      background-size: 200% 100%;
      animation: shimmer 2.5s ease-in-out infinite;
      padding: 0 4px;
      border-radius: 4px;
    }

    .entity-card {
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    .entity-card:hover { transform: translateY(-4px); }

    .entity-existing {
      border-color: #10b981;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(16, 185, 129, 0.04));
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.15);
    }
    .entity-design {
      border-color: #f59e0b;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
      box-shadow: 0 0 30px rgba(245, 158, 11, 0.2);
    }
    .entity-missing {
      border-color: #ef4444;
      border-style: dashed;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.12), rgba(239, 68, 68, 0.03));
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.15);
    }

    .scrollbar-custom::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-custom::-webkit-scrollbar-track { background: #18181b; }
    .scrollbar-custom::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

    .bg-grid {
      background-image:
        linear-gradient(rgba(63, 63, 70, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63, 63, 70, 0.15) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useMemo } = React;

    // ============================================================
    // DATA — Las preguntas pre-cargadas del taller
    // Cada pregunta describe: keywords, entities (con status), connections, SQL, traducción
    // ============================================================
    const QUESTIONS = [
      {
        id: "q1-seed",
        title: "Pregunta 1 — La seed",
        text: "De los coachees que iniciaron el programa con MIA, ¿cómo va el avance de cada uno?",
        keywords: ["coachees", "iniciaron", "programa", "avance"],
        entities: [
          { id: "tenants",            label: "tenants",              subtitle: "slug='mia'",            status: "existing", col: 1, row: 1, columns: ["id", "slug", "name"] },
          { id: "courses",            label: "courses",              subtitle: "el programa",            status: "existing", col: 2, row: 1, columns: ["id", "tenant_id", "title", "is_active"] },
          { id: "course_enrollments", label: "course_enrollments",   subtitle: "cada coachee",           status: "existing", col: 3, row: 1, columns: ["id", "course_id", "student_phone", "status", "enrolled_at"] },
          { id: "course_modules",     label: "course_modules",       subtitle: "los módulos",            status: "existing", col: 2, row: 2, columns: ["id", "course_id", "order", "module_type"] },
          { id: "student_progress",   label: "student_progress",     subtitle: "avance por módulo",      status: "existing", col: 3, row: 2, columns: ["enrollment_id", "module_id", "status", "completed_at"] },
          { id: "conversation_insights", label: "conversation_insights", subtitle: "avance NARRATIVO", status: "design",   col: 4, row: 2, columns: ["enrollment_id", "comprehension_level (low|mid|high)", "evolution_notes (TEXTO)"] },
        ],
        connections: [
          { from: "tenants", to: "courses" },
          { from: "courses", to: "course_enrollments" },
          { from: "courses", to: "course_modules" },
          { from: "course_enrollments", to: "student_progress" },
          { from: "course_modules", to: "student_progress" },
          { from: "course_enrollments", to: "conversation_insights" },
        ],
        sql:
`SELECT
  ce.student_name,
  ce.enrolled_at,
  c.title AS programa,
  COUNT(sp.id) FILTER (WHERE sp.status='completed') AS modulos_completados,
  COUNT(cm.id) AS modulos_totales,
  ROUND(100.0 * COUNT(sp.id) FILTER (WHERE sp.status='completed')
        / NULLIF(COUNT(cm.id),0), 1) AS pct_avance
FROM course_enrollments ce
JOIN tenants t         ON t.id = ce.tenant_id
JOIN courses c         ON c.id = ce.course_id
JOIN course_modules cm ON cm.course_id = c.id
LEFT JOIN student_progress sp
       ON sp.enrollment_id = ce.id
      AND sp.module_id    = cm.id
WHERE t.slug = 'mia' AND ce.status = 'active'
GROUP BY ce.id, c.id
ORDER BY pct_avance DESC NULLS LAST;`,
        translation: "MIA te dice exactamente quién va en qué módulo y qué porcentaje completó. La parte AMARILLA — el avance como concepto profundo — vive como narrativa en conversation_insights. No es un número del 1 al 10, es texto enriquecido. Si quieres KPI numérico, hay que diseñarlo. Es decisión de producto, no falla técnica.",
        designDecision: "MIA cuenta historia, no calcula KPI. Para tener scoring numérico hay que agregar columnas estructuradas (ej. progress_score INT, goal_alignment DECIMAL) a conversation_insights.",
        plainSummary: "Para responder esto MIA necesita saber 4 cosas: QUIÉN es cada coachee, EN QUÉ programa está, QUÉ módulos lleva completados, y QUÉ tan profunda ha sido la conversación. Las 3 primeras las tiene como datos duros (verde). La cuarta vive como notas escritas, no como un puntaje (amarillo).",
        concreteExample: "Ejemplo concreto: 'María Gómez, programa Liderazgo Consciente, lleva 4 de 7 módulos completados, último acceso ayer. En notas: \"María mostró un click importante al hablar de delegar — necesita más práctica en feedback directo\".'",
      },
      {
        id: "q2-completion",
        title: "Pregunta 2 — Completion del programa",
        text: "¿Qué porcentaje de coachees completó el programa entero?",
        keywords: ["porcentaje", "coachees", "completó", "programa"],
        entities: [
          { id: "tenants",            label: "tenants",            subtitle: "slug='mia'",           status: "existing", col: 1, row: 1, columns: ["id", "slug"] },
          { id: "course_enrollments", label: "course_enrollments", subtitle: "completed_at = manual", status: "design",   col: 2, row: 1, columns: ["id", "status", "enrolled_at", "completed_at (MANUAL)"] },
          { id: "student_progress",   label: "student_progress",   subtitle: "completion por módulo",  status: "existing", col: 3, row: 1, columns: ["enrollment_id", "module_id", "status"] },
          { id: "auto_completion_trigger", label: "auto-completion rule", subtitle: "FALTA", status: "missing", col: 2, row: 2, columns: ["IF todos modulos.status='completed'", "THEN enrollment.completed_at = NOW()"] },
        ],
        connections: [
          { from: "tenants", to: "course_enrollments" },
          { from: "course_enrollments", to: "student_progress" },
          { from: "student_progress", to: "auto_completion_trigger" },
          { from: "auto_completion_trigger", to: "course_enrollments" },
        ],
        sql:
`-- Lo que SE PUEDE responder hoy (manual):
SELECT
  COUNT(*) FILTER (WHERE completed_at IS NOT NULL) * 100.0 / COUNT(*) AS pct_completado
FROM course_enrollments ce
JOIN tenants t ON t.id = ce.tenant_id
WHERE t.slug = 'mia';

-- PROBLEMA: completed_at se setea a mano.
-- Resultado: el % refleja "quién marcamos como completo", no "quién completó de verdad".

-- Lo que DEBERÍA pasar (cálculo derivado):
SELECT
  COUNT(DISTINCT ce.id) FILTER (
    WHERE NOT EXISTS (
      SELECT 1 FROM course_modules cm
      LEFT JOIN student_progress sp
        ON sp.enrollment_id = ce.id AND sp.module_id = cm.id
      WHERE cm.course_id = ce.course_id
        AND (sp.status IS NULL OR sp.status != 'completed')
    )
  ) * 100.0 / COUNT(DISTINCT ce.id) AS pct_completado_real
FROM course_enrollments ce
JOIN tenants t ON t.id = ce.tenant_id
WHERE t.slug = 'mia';`,
        translation: "Hoy MIA tiene la columna 'completed_at' pero NADIE la pone automáticamente. Una persona tiene que entrar al admin y marcar manualmente. Entonces tu reporte de completion refleja 'a quién marcamos', no 'quién realmente terminó'. Eso es un GAP estructural — necesitas una regla automática que cierre el enrollment cuando los módulos estén todos completos.",
        designDecision: "Agregar un background job o un trigger en la BD: cuando StudentProgress llega a 'completed' en el último módulo del curso, actualizar CourseEnrollment.completed_at automáticamente.",
        plainSummary: "Para responder esto MIA necesita saber: quién se inscribió, y de esos quién terminó. La parte 'quién terminó' es donde está el problema: hoy alguien tiene que poner una marca a mano. Si nadie la pone, parece que nadie completó — aunque sí completaron.",
        concreteExample: "Imagínate: 10 coachees terminaron los 7 módulos del programa la semana pasada. Si el admin no entró a marcarlos como 'completados', tu reporte dice '0% completaron'. La realidad: 100% completaron. La regla automática elimina ese error.",
      },
      {
        id: "q3-goal",
        title: "Pregunta 3 — Objetivo declarado",
        text: "¿Qué objetivo declaró cada coachee al inicio del programa?",
        keywords: ["objetivo", "declaró", "coachee", "inicio"],
        entities: [
          { id: "tenants",            label: "tenants",            subtitle: "slug='mia'",                   status: "existing", col: 1, row: 1, columns: ["id", "slug"] },
          { id: "course_enrollments", label: "course_enrollments", subtitle: "onboarding_data = JSON libre", status: "design",   col: 2, row: 1, columns: ["id", "student_phone", "onboarding_data (JSONB sin schema)"] },
          { id: "coachee_goals",      label: "coachee_goals",      subtitle: "FALTA — tabla nueva",          status: "missing", col: 3, row: 1, columns: ["id", "enrollment_id FK", "goal_category", "goal_text", "target_date", "measurable_outcome"] },
          { id: "goal_progress",      label: "goal_progress",      subtitle: "FALTA — tracking",              status: "missing", col: 3, row: 2, columns: ["goal_id FK", "checkpoint_date", "score (0-100)", "evidence_summary"] },
        ],
        connections: [
          { from: "tenants", to: "course_enrollments" },
          { from: "course_enrollments", to: "coachee_goals" },
          { from: "coachee_goals", to: "goal_progress" },
        ],
        sql:
`-- Lo que se PUEDE leer hoy (JSON libre, sin schema):
SELECT
  ce.student_name,
  jsonb_pretty(ce.onboarding_data::jsonb) AS onboarding_raw
FROM course_enrollments ce
JOIN tenants t ON t.id = ce.tenant_id
WHERE t.slug = 'mia' AND ce.onboarding_data IS NOT NULL;

-- PROBLEMA: cada coachee puede tener su objetivo escrito de forma distinta,
-- en cualquier campo del JSON. Imposible agrupar, categorizar o medir avance.

-- Lo que necesitaríamos crear:
CREATE TABLE coachee_goals (
  id              UUID PRIMARY KEY,
  enrollment_id   UUID REFERENCES course_enrollments(id) ON DELETE CASCADE,
  goal_category   VARCHAR(50),   -- 'liderazgo' | 'comunicacion' | 'gestion_tiempo' | ...
  goal_text       TEXT,          -- texto narrativo del coachee
  target_date     DATE,
  measurable_outcome TEXT,       -- 'sostener 3 reuniones difíciles sin escalar'
  declared_at     TIMESTAMP DEFAULT NOW()
);`,
        translation: "Hoy MIA guarda lo que el coachee dice en su primer mensaje como un JSON sin estructura. Cada coachee tiene su objetivo escrito a su manera y en cualquier lugar del JSON. No puedes preguntar 'cuántos coachees vienen por liderazgo' ni 'cuántos lograron su objetivo'. Como dice el dicho del taller: una columna en JSON es una decisión postergada. Esto es ROADMAP claro.",
        designDecision: "Crear tabla coachee_goals con categoría + texto + outcome medible. Y una segunda tabla goal_progress para tracking. Esto convierte coaching narrativo en coaching medible sin perder la narrativa.",
        plainSummary: "Para responder esto MIA necesita saber: cuál fue el objetivo que el coachee declaró al inicio. Hoy esa información sí se captura — pero queda guardada como texto suelto, no como un dato que se pueda contar o agrupar. Es como tener mil cartas escritas a mano en una caja: la info está, pero no la puedes graficar.",
        concreteExample: "Imagínate que María dijo 'quiero ser mejor líder', Pedro dijo 'mejorar mi comunicación', y Ana dijo 'gestionar mi tiempo'. Hoy esos textos viven sueltos. NO puedes responder '¿cuántos coachees vienen por temas de liderazgo este trimestre?' — aunque la respuesta esté ahí.",
      },
      {
        id: "q4-kolb-completion",
        title: "Pregunta 4 — Kolb vs completion",
        text: "¿Los coachees con perfil Kolb 'Acomodador' completan más módulos que los 'Asimiladores'?",
        keywords: ["Kolb", "perfil", "completan", "módulos"],
        entities: [
          { id: "tenants",            label: "tenants",            subtitle: "slug='mia'",        status: "existing", col: 1, row: 1, columns: ["id", "slug"] },
          { id: "course_enrollments", label: "course_enrollments", subtitle: "cada coachee",      status: "existing", col: 2, row: 1, columns: ["id", "student_name"] },
          { id: "form_responses",     label: "form_responses",     subtitle: "test Kolb",         status: "existing", col: 3, row: 1, columns: ["enrollment_id", "computed_result (JSON con dominant_style)"] },
          { id: "student_progress",   label: "student_progress",   subtitle: "módulos completos", status: "existing", col: 2, row: 2, columns: ["enrollment_id", "module_id", "status"] },
          { id: "course_modules",     label: "course_modules",     subtitle: "total módulos",      status: "existing", col: 3, row: 2, columns: ["id", "course_id"] },
        ],
        connections: [
          { from: "tenants", to: "course_enrollments" },
          { from: "course_enrollments", to: "form_responses" },
          { from: "course_enrollments", to: "student_progress" },
          { from: "course_modules", to: "student_progress" },
        ],
        sql:
`SELECT
  fr.computed_result->>'dominant_style' AS perfil_kolb,
  COUNT(DISTINCT ce.id) AS coachees,
  AVG(modulos_completados) AS promedio_modulos
FROM course_enrollments ce
JOIN tenants t ON t.id = ce.tenant_id
LEFT JOIN form_responses fr ON fr.enrollment_id = ce.id
LEFT JOIN LATERAL (
  SELECT COUNT(*) AS modulos_completados
  FROM student_progress sp
  WHERE sp.enrollment_id = ce.id AND sp.status = 'completed'
) m ON true
WHERE t.slug = 'mia'
  AND fr.computed_result IS NOT NULL
GROUP BY perfil_kolb
ORDER BY promedio_modulos DESC;`,
        translation: "Esta es la pregunta JOYA — MIA SÍ la responde, sin gap. Puedes cruzar el perfil Kolb de cada coachee con cuántos módulos completó, y te dice qué estilo de aprendizaje resuena más con el programa. Sirve para decidir: ¿adaptamos el contenido para los perfiles que abandonan más, o reforzamos los que ya funcionan?",
        designDecision: "Cero cambios necesarios. Esta pregunta demuestra el VALOR del modelado que ya tienen.",
        plainSummary: "Para responder esto MIA necesita conectar tres cosas: el resultado del test de Kolb de cada coachee, los módulos que cada uno completó, y el total de módulos del programa. Las tres están ahí, listas para cruzarse. Sin gaps.",
        concreteExample: "Resultado real: 'Los coachees con perfil Acomodador completan en promedio 5.8 módulos. Los Asimiladores: 3.2. Conclusión: el contenido actual conecta mejor con quien aprende haciendo. Decisión: rediseñar 2 módulos para Asimiladores, o aceptar que el programa es para Acomodadores y comunicarlo así.'",
      },
      {
        id: "q5-stuck",
        title: "Pregunta 5 — Módulo donde se quedan",
        text: "¿En qué módulo se quedan más coachees? ¿Cuál es el módulo de mayor abandono?",
        keywords: ["módulo", "quedan", "abandono", "coachees"],
        entities: [
          { id: "tenants",            label: "tenants",            subtitle: "slug='mia'",     status: "existing", col: 1, row: 1, columns: ["id", "slug"] },
          { id: "course_enrollments", label: "course_enrollments", subtitle: "cada coachee",   status: "existing", col: 2, row: 1, columns: ["id", "status"] },
          { id: "student_progress",   label: "student_progress",   subtitle: "último módulo tocado", status: "existing", col: 3, row: 1, columns: ["enrollment_id", "module_id", "status", "updated_at"] },
          { id: "course_modules",     label: "course_modules",     subtitle: "info del módulo", status: "existing", col: 3, row: 2, columns: ["id", "title", "order", "module_type"] },
        ],
        connections: [
          { from: "tenants", to: "course_enrollments" },
          { from: "course_enrollments", to: "student_progress" },
          { from: "course_modules", to: "student_progress" },
        ],
        sql:
`WITH last_module AS (
  SELECT DISTINCT ON (sp.enrollment_id)
    sp.enrollment_id,
    sp.module_id,
    sp.status
  FROM student_progress sp
  JOIN course_enrollments ce ON ce.id = sp.enrollment_id
  JOIN tenants t            ON t.id = ce.tenant_id
  WHERE t.slug = 'mia' AND sp.status != 'completed'
  ORDER BY sp.enrollment_id, sp.updated_at DESC
)
SELECT
  cm.order AS modulo_n,
  cm.title AS modulo,
  COUNT(*) AS coachees_atascados
FROM last_module lm
JOIN course_modules cm ON cm.id = lm.module_id
GROUP BY cm.id
ORDER BY coachees_atascados DESC;`,
        translation: "MIA te dice EXACTAMENTE en qué módulo se atascan los coachees. Es el dato más útil para mejorar tu producto: el módulo con más abandono = el módulo que hay que revisar. Es como tener Google Analytics pero del aprendizaje. Sin gaps, todo verde.",
        designDecision: "Cero cambios. Otra pregunta donde el modelo brilla.",
        plainSummary: "Para responder esto MIA mira el último módulo que cada coachee tocó (sin completar), agrupa por módulo, y cuenta. El módulo con más coachees parados = el módulo que tiene un problema. Puede ser muy difícil, muy aburrido, o estar mal explicado.",
        concreteExample: "Ejemplo: 'Módulo 4 — Conversaciones difíciles: 12 coachees atascados. Módulo 2: 3 atascados. Módulo 1: 1 atascado.' Conclusión obvia: hay que revisar qué pasa en el módulo 4. Tal vez la actividad es muy demandante, tal vez el coach tiene que intervenir más temprano, tal vez hay que dividirlo en dos.",
      },
    ];

    // ============================================================
    // ENTITY_PLAIN_NAMES — Traducción de tabla técnica a lenguaje humano
    // ============================================================
    const ENTITY_PLAIN_NAMES = {
      tenants:                  { title: "El espacio de MIA en Prestigio",      hint: "Como tu cuenta dentro de la plataforma" },
      courses:                  { title: "El programa de coaching",              hint: "Cada programa que ofreces a tus coachees" },
      course_enrollments:       { title: "Los coachees inscritos",               hint: "Como una lista de Excel: nombre, teléfono, cuándo entró" },
      course_modules:           { title: "Los módulos del programa",             hint: "El contenido dividido en partes, ordenado" },
      student_progress:         { title: "Por qué módulos pasó cada coachee",    hint: "Diario de avance: quién terminó qué, cuándo" },
      conversation_insights:    { title: "Notas profundas del coaching",         hint: "Lo que MIA aprende de la conversación. Texto, no números." },
      form_responses:           { title: "Respuestas al test (Kolb)",            hint: "Resultado del test de estilo de aprendizaje" },
      auto_completion_trigger:  { title: "Regla automática de cierre",           hint: "La regla NO existe: hoy alguien tiene que marcar 'completado' a mano" },
      coachee_goals:            { title: "Tabla de objetivos por coachee",       hint: "Esta tabla NO existe. Hoy el objetivo vive enterrado en un JSON sin schema" },
      goal_progress:            { title: "Medición de avance vs objetivo",       hint: "Esta tabla NO existe. Sin ella no puedes graficar 'qué tanto se acercó cada coachee a su meta'" },
    };

    // ============================================================
    // SCHEMA_KNOWLEDGE — Lo que Claude debe saber sobre zona-ai
    // para mapear preguntas del cliente en vivo a entidades reales
    // ============================================================
    const SCHEMA_KNOWLEDGE = `Eres un asistente que analiza preguntas de negocio sobre el dominio de COACHING de zona-ai (producto MIA, tenant de Prestigio). Tu trabajo: descomponer una pregunta en español natural en las tablas y columnas necesarias para responderla, marcando qué EXISTE hoy (verde), qué existe pero como decisión de diseño (amarillo), y qué FALTA (rojo).

# TABLAS QUE EXISTEN HOY EN ZONA-AI (status: "existing" — VERDE)

- tenants (id, slug, name) — el tenant MIA tiene slug='mia'
- courses (id, tenant_id, title, is_active) — los programas del tenant
- course_modules (id, course_id, title, order, module_type [reading|form|kolb_test], completion_criteria, module_objectives)
- course_enrollments (id, course_id, tenant_id, student_phone, student_name, status [pending_terms|active|completed], enrolled_at, completed_at, onboarding_data JSONB)
- student_progress (id, enrollment_id, module_id, status [not_started|in_progress|completed], started_at, completed_at, attendance_count, current_flow_step)
- module_forms (id, module_id, form_type, questions JSONB, scoring_rules JSONB) — incluye el Kolb test como form_type='assessment'
- form_responses (id, form_id, enrollment_id, answers JSONB, computed_result JSONB) — computed_result.dominant_style tiene el perfil Kolb

    // ============================================================
    // imageToBase64 — File → base64 sin prefijo data:
    // ============================================================
    const imageToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        const base64 = String(result).split(",")[1];
        resolve({ data: base64, mediaType: file.type });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // ============================================================
    // processSchema — convierte DDL/texto/imagen en knowledge base
    // ============================================================
    const processSchema = async ({ type, text, image }, apiKey) => {
      let userContent;
      if (type === "image" && image) {
        userContent = [
          { type: "image", source: { type: "base64", media_type: image.mediaType, data: image.data } },
          { type: "text", text: "Esta imagen es el diagrama/ERD de una base de datos. Analízalo y devuelve el JSON con name, summary, tablesCount y knowledgePrompt según el schema indicado en system." }
        ];
      } else {
        const label = type === "ddl" ? "DDL/SQL" : "descripción libre";
        userContent = `Esquema recibido (${label}):\n\n\`\`\`\n${text}\n\`\`\`\n\nDevuelve el JSON ahora.`;
      }

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 4000,
          system: SCHEMA_PROCESSING_PROMPT,
          messages: [{ role: "user", content: userContent }]
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API ${response.status}: ${errText.slice(0, 300)}`);
      }
      const data = await response.json();
      const rawText = data.content?.[0]?.text || "";
      const cleaned = rawText.trim().replace(/^```json\s*/i, "").replace(/^```\s*/, "").replace(/\s*```$/, "");

      let parsed;
      try { parsed = JSON.parse(cleaned); }
      catch (e) { throw new Error(`No se pudo parsear el esquema. Texto crudo:\n${rawText.slice(0, 500)}`); }

      if (parsed.error) throw new Error(parsed.error);
      if (!parsed.knowledgePrompt) throw new Error("Respuesta sin knowledgePrompt válido.");

      parsed.processedAt = new Date().toISOString();
      parsed.sourceType = type;
      return parsed;
    };

    // ============================================================
    // analyzeWithClaude — llama a Claude API desde el browser
    // ============================================================
    const analyzeWithClaude = async (questionText, apiKey, customKnowledge = null) => {
      const systemKnowledge = customKnowledge || SCHEMA_KNOWLEDGE;
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 3000,
          system: [
            { type: "text", text: systemKnowledge, cache_control: { type: "ephemeral" } }
          ],
          messages: [
            { role: "user", content: `Pregunta del cliente: "${questionText}"\n\nDevuelve el JSON ahora, sin nada más.` }
          ]
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API ${response.status}: ${errText.slice(0, 300)}`);
      }

      const data = await response.json();
      const rawText = data.content?.[0]?.text || "";

      // Strip markdown code fences si Claude las metió
      const cleaned = rawText.trim().replace(/^```json\s*/i, "").replace(/^```\s*/, "").replace(/\s*```$/, "");

      let parsed;
      try {
        parsed = JSON.parse(cleaned);
      } catch (e) {
        throw new Error(`No se pudo parsear el JSON de Claude. Texto crudo:\n${rawText.slice(0, 500)}`);
      }

      // Validación mínima de shape
      if (!parsed.entities || !Array.isArray(parsed.entities) || parsed.entities.length === 0) {
        throw new Error("Claude devolvió una respuesta sin entidades válidas.");
      }

      // Asignar id único e identificarla como live
      parsed.id = `live-${Date.now()}`;
      parsed.title = parsed.title || "Pregunta del cliente";

      return parsed;
    };

    const useSequenced = (items, intervalMs, enabled) => {

        const timers = items.map((_, i) =>
          setTimeout(() => setVisibleCount((c) => Math.max(c, i + 1)), i * intervalMs)
        );
        return () => timers.forEach(clearTimeout);
      }, [enabled, items.length, intervalMs]);
      return visibleCount;

    const ConnectionsSVG = ({ entities, connections, visibleEntityIds }) => {
      const containerRef = useRef(null);
      const [paths, setPaths] = useState([]);

      useEffect(() => {
        const calc = () => {
          if (!containerRef.current) return;
          const container = containerRef.current.parentElement;
          if (!container) return;
          const containerRect = container.getBoundingClientRect();
          const newPaths = connections
            .filter(c => visibleEntityIds.has(c.from) && visibleEntityIds.has(c.to))
            .map((c, i) => {
              const fromEl = container.querySelector(`[data-entity-id="${c.from}"]`);
              const toEl   = container.querySelector(`[data-entity-id="${c.to}"]`);
              if (!fromEl || !toEl) return null;
              const fr = fromEl.getBoundingClientRect();
              const tr = toEl.getBoundingClientRect();
              const fromX = fr.left + fr.width / 2 - containerRect.left;
              const fromY = fr.top  + fr.height / 2 - containerRect.top;
              const toX   = tr.left + tr.width / 2 - containerRect.left;
              const toY   = tr.top  + tr.height / 2 - containerRect.top;
              const toEntity = entities.find(e => e.id === c.to);
              const fromEntity = entities.find(e => e.id === c.from);
              const isMissing = toEntity?.status === "missing" || fromEntity?.status === "missing";
              const isDesign  = !isMissing && (toEntity?.status === "design" || fromEntity?.status === "design");
              const stroke = isMissing ? "#ef4444" : isDesign ? "#f59e0b" : "#52525b";
              const midY = (fromY + toY) / 2;
              const d = `M ${fromX} ${fromY} C ${fromX} ${midY}, ${toX} ${midY}, ${toX} ${toY}`;
              return { d, stroke, key: `${c.from}-${c.to}-${i}`, dashed: isMissing };
            })
            .filter(Boolean);
          setPaths(newPaths);
        };
        const id = setTimeout(calc, 50);
        window.addEventListener("resize", calc);
        return () => { clearTimeout(id); window.removeEventListener("resize", calc); };
      }, [connections, visibleEntityIds, entities]);

      return (
        <svg ref={containerRef} className="absolute inset-0 pointer-events-none" style={{ width: "100%", height: "100%" }}>
          {paths.map(p => (
            <path
              key={p.key}
              d={p.d}
              stroke={p.stroke}
              strokeWidth="2.5"
              fill="none"
              strokeDasharray={p.dashed ? "8 6" : "1000"}
              className={p.dashed ? "" : "draw-line"}
              opacity="0.7"
            />
          ))}
        </svg>
      );
    };

        if (stage === 2) return greens;
        if (stage === 3) return [...greens, ...yellows];
        return [...greens, ...yellows, ...reds];
      }, [question, stage]);

      const visibleIds = useMemo(() => new Set(visibleEntities.map(e => e.id)), [visibleEntities]);

      const cols = Math.max(...question.entities.map(e => e.col));

        if (!hasKey) { onRequestKey(); return; }

    const SchemaContextModal = ({ onSubmit, onClose, isProcessing, error }) => {
      const [tab, setTab] = useState("ddl"); // 'ddl' | 'description' | 'image'
      const [text, setText] = useState("");
      const [imageFile, setImageFile] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const fileInputRef = useRef(null);

      const handleFile = (file) => {
        if (!file) return;
        if (!file.type.startsWith("image/")) {
          alert("Por favor sube una imagen (PNG, JPG, etc.)");
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          alert("La imagen es muy grande (máx 5MB).");
          return;
        }
        setImageFile(file);
        const reader = new FileReader();
        reader.onload = () => setImagePreview(reader.result);
        reader.readAsDataURL(file);
      };

      const submit = async () => {
        if (tab === "image") {
          if (!imageFile) return;
          const image = await imageToBase64(imageFile);
          onSubmit({ type: "image", image });
        } else if (tab === "ddl") {
          if (!text.trim()) return;
          onSubmit({ type: "ddl", text: text.trim() });
        } else {
          if (!text.trim()) return;
          onSubmit({ type: "description", text: text.trim() });
        }
      };

      const canSubmit = tab === "image" ? !!imageFile : !!text.trim();

      const tabs = [
        { id: "ddl",         label: "DDL / SQL",         hint: "Pega CREATE TABLE statements" },
        { id: "description", label: "Descripción libre", hint: "Describe tus tablas en español" },

            <div className="p-6 overflow-y-auto scrollbar-custom flex-1">

              {tab === "ddl" && (
                <textarea
                  value={text}
                  onChange={(e) => setText(e.target.value)}
                  disabled={isProcessing}
                  placeholder={`CREATE TABLE users (\n  id UUID PRIMARY KEY,\n  email VARCHAR(255) UNIQUE,\n  created_at TIMESTAMP\n);\n\nCREATE TABLE orders (\n  id UUID PRIMARY KEY,\n  user_id UUID REFERENCES users(id),\n  total DECIMAL(10,2),\n  status VARCHAR(50)\n);\n\n-- Pega tu pg_dump --schema-only o mysqldump -d`}
                  rows="12"
                  className="w-full bg-zinc-900 border border-zinc-800 focus:border-emerald-500 outline-none rounded-xl px-4 py-3 text-white text-sm font-mono leading-relaxed resize-none disabled:opacity-50"
                />
              )}

              {tab === "description" && (
                <textarea
                  value={text}
                  onChange={(e) => setText(e.target.value)}
                  disabled={isProcessing}
                  placeholder={`Ejemplo:\n\nTenemos una BD de e-commerce. La tabla 'users' guarda los clientes (id, email, fecha de registro). La tabla 'orders' guarda los pedidos y se conecta a users por user_id. Cada order tiene un total, status (pending, paid, shipped, cancelled), y created_at. Los productos están en 'products' con (id, name, price, stock). Y 'order_items' conecta orders con products...`}
                  rows="12"
                  className="w-full bg-zinc-900 border border-zinc-800 focus:border-emerald-500 outline-none rounded-xl px-4 py-3 text-white text-base leading-relaxed resize-none disabled:opacity-50"
                />
              )}

              {tab === "image" && (
                <div>
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    onChange={(e) => handleFile(e.target.files?.[0])}
                    className="hidden"
                    disabled={isProcessing}
                  />
                  {!imagePreview ? (
                    <div
                      onClick={() => fileInputRef.current?.click()}
                      onDragOver={(e) => e.preventDefault()}
                      onDrop={(e) => { e.preventDefault(); handleFile(e.dataTransfer.files?.[0]); }}
                      className="border-2 border-dashed border-zinc-700 hover:border-emerald-500 rounded-2xl p-12 text-center cursor-pointer transition-colors"
                    >
                      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="mx-auto mb-4 text-zinc-500">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                      </svg>
                      <p className="text-white font-semibold mb-1">Sube el ERD o screenshot del diagrama</p>
                      <p className="text-sm text-zinc-500">Click para elegir, o arrastra una imagen aquí · PNG/JPG, máx 5MB</p>
                    </div>
                  ) : (
                    <div className="relative">
                      <img src={imagePreview} alt="ERD preview" className="w-full rounded-2xl border border-zinc-800" />
                      <button
                        onClick={() => { setImageFile(null); setImagePreview(null); }}
                        className="absolute top-3 right-3 bg-zinc-950/80 hover:bg-zinc-900 border border-zinc-700 rounded-full w-8 h-8 flex items-center justify-center text-white"
                      >×</button>
                      <p className="text-xs text-zinc-500 mt-2 text-center">{imageFile?.name} · {(imageFile?.size / 1024).toFixed(0)} KB</p>
                    </div>
                  )}
                </div>
              )}

              {error && (
                <div className="mt-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-300">
                  <strong>Error:</strong> {error}
                </div>
              )}
            </div>

            <div className="px-6 py-4 border-t border-zinc-800 flex gap-3 flex-shrink-0">
              <button
                onClick={submit}
                disabled={!canSubmit || isProcessing}
                className={`flex-1 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 ${(!canSubmit || isProcessing) ? "bg-zinc-800 text-zinc-500 cursor-not-allowed" : "bg-emerald-500 hover:bg-emerald-400 text-zinc-950"}`}
              >
                {isProcessing && (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="animate-spin">

    const App = () => {
      const [selectedId, setSelectedId] = useState(null);
      const [stage, setStage] = useState(0); // 0=picker, 1=question shown, 2=greens, 3=+yellows, 4=+reds
      const [openPanel, setOpenPanel] = useState(null); // 'sql' | 'translation' | 'gaps'
      const [liveQuestion, setLiveQuestion] = useState(null);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analyzeError, setAnalyzeError] = useState(null);
      const [apiKey, setApiKey] = useState(() => {
        try {
          const fromStorage = localStorage.getItem("claude_api_key");
          if (fromStorage) return fromStorage;
          if (typeof window !== "undefined" && window.LOCAL_API_KEY) {
            localStorage.setItem("claude_api_key", window.LOCAL_API_KEY);
            return window.LOCAL_API_KEY;
          }
          return "";
        } catch {
          return (typeof window !== "undefined" && window.LOCAL_API_KEY) || "";
        }
      });
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [activeSchema, setActiveSchema] = useState(() => {
        try {
          const raw = localStorage.getItem("claude_active_schema");
          return raw ? JSON.parse(raw) : null;
        } catch { return null; }
      });
      const [showSchemaModal, setShowSchemaModal] = useState(false);
      const [isProcessingSchema, setIsProcessingSchema] = useState(false);
      const [schemaError, setSchemaError] = useState(null);

      const question = selectedId && selectedId.startsWith("live-")
        ? liveQuestion
        : QUESTIONS.find(q => q.id === selectedId);

      const reset = () => { setSelectedId(null); setStage(0); setOpenPanel(null); };

      const startReveal = (id) => {
        setSelectedId(id);
        setStage(1);
        setOpenPanel(null);
        setTimeout(() => setStage(2), 1400);
        setTimeout(() => setStage(3), 2900);
        setTimeout(() => setStage(4), 4200);
      };

      const pickQuestion = (id) => startReveal(id);

      const handleAnalyze = async (text) => {
        setIsAnalyzing(true);
        setAnalyzeError(null);
        try {
          const customKnowledge = activeSchema?.knowledgePrompt || null;
          const parsed = await analyzeWithClaude(text, apiKey, customKnowledge);
          setLiveQuestion(parsed);
          startReveal(parsed.id);
        } catch (err) {
          setAnalyzeError(err.message || String(err));
        } finally {
          setIsAnalyzing(false);
        }
      };

      const saveKey = (k) => {
        setApiKey(k);
        try { localStorage.setItem("claude_api_key", k); } catch {}
        setShowKeyModal(false);
      };

      const handleProcessSchema = async (input) => {
        if (!apiKey) { setShowSchemaModal(false); setShowKeyModal(true); return; }
        setIsProcessingSchema(true);
        setSchemaError(null);
        try {
          const parsed = await processSchema(input, apiKey);
          setActiveSchema(parsed);
          try { localStorage.setItem("claude_active_schema", JSON.stringify(parsed)); } catch {}
          setShowSchemaModal(false);
          reset();
        } catch (err) {
          setSchemaError(err.message || String(err));
        } finally {
          setIsProcessingSchema(false);
        }
      };

        setActiveSchema(null);
        try { localStorage.removeItem("claude_active_schema"); } catch {}
        reset();

      const hasReds    = question?.entities.some(e => e.status === "missing");

                <div>

                <button

                >

                  {apiKey ? "API key ✓" : "API key"}
                </button>
                {question && (

              schema={activeSchema}
              onChange={() => setShowSchemaModal(true)}
              onClear={clearActiveSchema}

            {!question && (
              <div className="fade-in-up">
                <div className="text-center py-12">

                  </h1>
                  <p className="text-xl text-zinc-400 max-w-2xl mx-auto mt-6">
                    {activeSchema
                      ? `Estás analizando: ${activeSchema.name}. Escribe abajo cualquier pregunta sobre esta BD.`
                      : "Cinco preguntas sobre MIA. Dos totalmente verdes, tres con conversación pendiente. Elige una para empezar."

                {!activeSchema && (

                <div className="flex items-center gap-3 mt-10 mb-5">

                  <div className="h-px bg-zinc-800 flex-1"></div>

                <div className="grid md:grid-cols-2 gap-4">
                  {QUESTIONS.map((q, i) => {

                    const reds    = q.entities.filter(e => e.status === "missing").length;
                    return (

                        onClick={() => pickQuestion(q.id)}
                        className="text-left bg-zinc-900/50 hover:bg-zinc-900 border border-zinc-800 hover:border-zinc-600 rounded-2xl p-6 transition-all group fade-in-up"
                        style={{ animationDelay: `${i * 0.08}s` }}
                      >
                        <div className="text-xs font-semibold text-zinc-500 tracking-widest mb-2">{q.title.toUpperCase()}</div>
                        <p className="text-lg font-semibold text-white leading-snug group-hover:text-amber-200 transition-colors">
                          {q.text}
                        </p>
                        <div className="flex items-center gap-2 mt-4 flex-wrap">
                          {greens  > 0 && <span className="text-xs bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded-full">{greens} verdes</span>}
                          {yellows > 0 && <span className="text-xs bg-amber-500/20 text-amber-300 px-2 py-1 rounded-full">{yellows} amarillas</span>}
                          {reds    > 0 && <span className="text-xs bg-red-500/20 text-red-300 px-2 py-1 rounded-full">{reds} faltantes</span>}
                        </div>
                      </button>
                    );
                  })}
                </div>
                </>
                )}
              </div>
            )}

            {question && (
              <div className="space-y-8">
                <div className="fade-in-up">
                  <div className="text-xs font-semibold text-amber-400 tracking-widest mb-3">{question.title.toUpperCase()}</div>
                  <HighlightedQuestion text={question.text} keywords={question.keywords} />
                </div>

                {stage >= 1 && question.plainSummary && (
                  <PlainSummary summary={question.plainSummary} />
                )}

                {stage >= 2 && (
                  <div className="fade-in-up">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="h-px bg-zinc-800 flex-1"></div>
                      <div className="text-xs font-semibold text-zinc-500 tracking-widest">
                        {stage === 2 && "PASO 1 — LO QUE LA BD YA TIENE"}
                        {stage === 3 && "PASO 2 — DECISIONES DE DISEÑO"}
                        {stage >= 4 && "PASO 3 — MAPA COMPLETO"}
                      </div>
                      <div className="h-px bg-zinc-800 flex-1"></div>
                    </div>
                    <Canvas question={question} stage={stage} />
                  </div>
                )}

                {stage >= 4 && (
                  <div className="fade-in-up space-y-4 pt-4">
                    <button onClick={() => setOpenPanel("translation")} className="w-full bg-gradient-to-r from-amber-500/20 to-amber-500/5 hover:from-amber-500/30 hover:to-amber-500/10 border-2 border-amber-500/50 rounded-2xl p-6 text-left transition-all group flex items-center gap-5">
                      <div className="w-14 h-14 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-300 flex-shrink-0">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                      </div>
                      <div className="flex-1">
                        <div className="text-2xl md:text-3xl font-black text-white group-hover:text-amber-200 leading-tight">EN CRISTIANO</div>
                        <div className="text-base text-zinc-300 mt-1">Qué significa todo esto, con un ejemplo concreto que cualquiera entiende</div>
                      </div>
                      <div className="text-amber-400 text-3xl flex-shrink-0">→</div>
                    </button>
                    <div className="grid md:grid-cols-2 gap-4">
                      <button
                        onClick={() => setOpenPanel("gaps")}
                        disabled={!hasYellows && !hasReds}
                        className={`border rounded-xl p-5 text-left transition-all group ${(!hasYellows && !hasReds) ? "bg-zinc-900/30 border-zinc-900 opacity-40 cursor-not-allowed" : "bg-zinc-900 hover:bg-zinc-800 border-zinc-700"}`}
                      >
                        <div className="flex items-center gap-3 mb-2">
                          <div className="text-red-400">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                          </div>
                          <div className="text-lg font-bold text-white group-hover:text-red-300">¿Qué falta?</div>
                        </div>
                        <div className="text-sm text-zinc-500">{(!hasYellows && !hasReds) ? "Esta pregunta no tiene gaps" : "Roadmap de datos para responderla 100%"}</div>
                      </button>
                      <button onClick={() => setOpenPanel("sql")} className="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-xl p-5 text-left transition-all group">
                        <div className="flex items-center gap-3 mb-2">
                          <div className="text-emerald-400">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                          </div>
                          <div className="text-lg font-bold text-white group-hover:text-emerald-300">SQL (solo técnicos)</div>
                        </div>
                        <div className="text-sm text-zinc-500">Query ejecutable contra zona_ai</div>
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>

          {openPanel === "sql" && question && (
            <Panel icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>} title="SQL ejecutable" color="emerald" onClose={() => setOpenPanel(null)}>
              <div className="text-sm text-zinc-400 mb-4">Query contra <code className="text-emerald-400">zona_ai</code>, filtrado a <code className="text-emerald-400">tenants.slug = 'mia'</code>:</div>
              <pre className="bg-zinc-900 border border-zinc-800 rounded-xl p-5 text-sm text-emerald-200 overflow-x-auto scrollbar-custom leading-relaxed">{question.sql}</pre>
            </Panel>
          )}

          {openPanel === "translation" && question && (
            <Panel icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>} title="En cristiano" color="amber" onClose={() => setOpenPanel(null)}>
              {question.concreteExample && (
                <div className="mb-6 p-6 bg-gradient-to-br from-emerald-500/15 to-emerald-500/5 border-2 border-emerald-500/40 rounded-2xl">
                  <div className="text-xs font-bold text-emerald-400 tracking-widest mb-3 flex items-center gap-2">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
                    EJEMPLO CONCRETO
                  </div>
                  <p className="text-xl text-white leading-relaxed font-medium">{question.concreteExample}</p>
                </div>
              )}
              <div className="mb-6">
                <div className="text-xs font-bold text-zinc-400 tracking-widest mb-3">QUÉ SIGNIFICA TODO ESTO</div>
                <p className="text-lg text-zinc-100 leading-relaxed">{question.translation}</p>
              </div>
              {question.designDecision && (
                <div className="p-5 bg-amber-500/10 border border-amber-500/30 rounded-2xl">
                  <div className="text-xs font-bold text-amber-400 tracking-widest mb-2">PRÓXIMO PASO DE PRODUCTO</div>
                  <p className="text-white leading-relaxed">{question.designDecision}</p>
                </div>
              )}
            </Panel>
          )}

          {openPanel === "gaps" && question && (
            <Panel icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>} title="¿Qué falta? — Roadmap" color="red" onClose={() => setOpenPanel(null)}>
              <div className="space-y-4">
                {question.entities.filter(e => e.status === "design").map(e => (
                  <div key={e.id} className="p-5 bg-amber-500/10 border border-amber-500/30 rounded-2xl">
                    <div className="flex items-center gap-3 mb-2">
                      <StatusBadge status="design" />
                      <code className="text-amber-300 font-bold">{e.label}</code>
                    </div>
                    <div className="text-white text-lg font-semibold mb-1">{e.subtitle}</div>
                    <div className="text-zinc-400 text-sm">Existe la tabla, pero el dato vive en un formato que no permite analítica directa. Es decisión de producto, no falla.</div>
                  </div>
                ))}
                {question.entities.filter(e => e.status === "missing").map(e => (
                  <div key={e.id} className="p-5 bg-red-500/10 border border-red-500/30 border-dashed rounded-2xl">
                    <div className="flex items-center gap-3 mb-2">
                      <StatusBadge status="missing" />
                      <code className="text-red-300 font-bold">{e.label}</code>
                    </div>
                    <div className="text-white text-lg font-semibold mb-2">{e.subtitle}</div>
                    <div className="text-zinc-300 text-sm mb-3">Estructura propuesta:</div>
                    <ul className="space-y-1">
                      {e.columns.map((c, i) => <li key={i} className="text-xs text-zinc-300 font-mono">• {c}</li>)}
                    </ul>
                  </div>
                ))}
                {question.designDecision && (
                  <div className="p-5 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl">
                    <div className="text-xs font-bold text-emerald-400 tracking-widest mb-2">DECISIÓN A TOMAR CON EL CLIENTE</div>
                    <p className="text-white leading-relaxed">{question.designDecision}</p>
                  </div>
                )}
              </div>
            </Panel>
          )}

          {showKeyModal && (
            <ApiKeyModal
              initialKey={apiKey}
              onSave={saveKey}
              onClose={() => setShowKeyModal(false)}
            />
          )}

          {showSchemaModal && (
            <SchemaContextModal
              onSubmit={handleProcessSchema}
              onClose={() => { setShowSchemaModal(false); setSchemaError(null); }}
              isProcessing={isProcessingSchema}
              error={schemaError}
            />
          )}

          <footer className="border-t border-zinc-900 mt-16 py-6">
            <div className="max-w-7xl mx-auto px-6 text-center text-xs text-zinc-600">
              Demo guiada + análisis en vivo — Sabores A + B. Construida para el taller Prestigio × Crearia, mayo 2026.
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
